ตโนมัติทันที ซึ่งหากท่านไม่กดรับ เงินโบนัสที่ได้นั้นก็จะยังคงค้างอยู่ โดยไม่หายไปแน่นอน (แต่หากมีการกดรับโปรโมชั่น ท่านจะไม่สามารถรับโบนัสได้เพื่อป้องกันการโกง)</p><p><br>• หากลูกข่ายของท่านมีการเดิมพัน บาคาร่า/สล็อต/กีฬา เมื่อมียอดเดิมพันไม่ว่าจะได้หรือเสีย ระบบจะคิดค่าคอมมิชชั่นให้ท่าน 0.5% โดยอัตโนมัติทันที แต่ท่านต้องกดรับค่าคอมมิชชั่นก่อน จึงจะสามารถรับโบนัสได้</p>\"},{\"question\":\"การแนะนำเพื่อนมีความเสี่ยงหรือไม่?\",\"answer\":\"<p>การแนะนำเพื่อนนั้นไม่มีความเสี่ยงใดๆ โดยยอดได้หรือเสียทั้งหมดของเพื่อนที่ท่านแนะนำ ทางบริษัทเป็นผู้รับผิดชอบ ไม่ว่าสมาชิกที่ท่านแนะนำจะชนะหรือแพ้ ท่านจะได้รับค่าคอมมิชชั่นแนะนำเพื่อนโดยอัตโนมัติทันที</p>\"},{\"question\":\"โฆษณาอย่างไร/ทำอย่างไรเพื่อให้ได้สมาชิกมากขึ้น?\",\"answer\":\"<p>• ใช้ Social Media ออนไลน์ของท่าน เช่น LINE, Facebook, Instagram, Twitter เป็นต้น เพื่อใช้ในการโปรโมท Agent dev โดยการนำลิงก์แนะนำเพื่อนไปแชร์หรือส่งต่อให้เพื่อนของท่านได้ไม่จำกัด</p><p>&nbsp;</p><p>• แนะนำเว็บไซต์ Agent dev ให้กับเพื่อน ๆ ของท่านที่ชอบเล่นเกม / กีฬาต่างๆ จากนั้นส่งต่อให้พวกเขาทราบเกี่ยวกับเกม/โปรโมชั่น/กิจกรรมสนุกๆที่สามารถสร้างรายได้ เพื่อให้เพื่อนของท่านมาสมัครเป็นสมาชิกกับทาง Agent dev</p>\"}]","sort_contact":null},{"key":"icon_mission","is_active":1,"value":null,"sort_contact":null},{"key":"info_video_guild_normal","is_active":1,"value":null,"sort_contact":null},{"key":"info_video_guild_small","is_active":1,"value":null,"sort_contact":null},{"key":"affiliate_video_guild_normal","is_active":1,"value":null,"sort_contact":null},{"key":"affiliate_video_guild_small","is_active":1,"value":null,"sort_contact":null},{"key":"flip_coin_start","is_active":1,"value":null,"sort_contact":null},{"key":"flip_coin_animate","is_active":1,"value":null,"sort_contact":null},{"key":"provider_preset","is_active":1,"value":"{\"set\":1,\"preset\":1}","sort_contact":null},{"key":"overwrite_provider_sport","is_active":0,"value":"[{\"type\":\"provider\",\"provider_id\":2,\"provider_code\":\"SBO\",\"card_id\":0,\"name\":\"\",\"is_newgame\":0,\"is_hotgam
