name: Patch dashboard role worklist
on:
  push:
    paths:
      - '.github/dashboard-role-worklist.trigger'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mark role-based dashboard complete
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/admin-modernization-chat-worklist.md')
          text = path.read_text()
          old = '- [ ] Role-based dashboard'
          new = '- [x] Role-based dashboard'
          if old not in text:
              raise SystemExit('worklist target not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Remove temporary files
        run: rm -f .github/workflows/patch-dashboard-role-worklist.yml .github/dashboard-role-worklist.trigger
      - name: Commit result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/admin-modernization-chat-worklist.md .github/workflows/patch-dashboard-role-worklist.yml .github/dashboard-role-worklist.trigger
          git commit -m "docs(admin): mark role-based dashboard complete"
          git push
