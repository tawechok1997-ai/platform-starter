name: Sync pnpm lockfile

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-lockfile.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Regenerate lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: Verify frozen install
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Commit synchronized lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml is already synchronized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: synchronize pnpm lockfile"
          git push
