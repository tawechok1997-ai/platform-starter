name: Refresh Sharp Lockfile

on:
  pull_request:
    paths:
      - 'pnpm-workspace.yaml'
      - '.github/workflows/refresh-sharp-lockfile.yml'

permissions:
  contents: write

jobs:
  refresh-lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Refresh lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile --reporter=silent
      - name: Commit refreshed lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo 'Lockfile already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git commit -m 'chore(deps): refresh lockfile for sharp override'
          git push origin HEAD:${{ github.head_ref }}
