name: Closure Diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/closure-diagnostics.yml'

permissions:
  contents: read

jobs:
  closure-diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies quietly
        run: pnpm install --frozen-lockfile --reporter=silent
      - name: Capture closure audit outputs
        shell: bash
        run: |
          set +e
          mkdir -p closure-diagnostics
          run_audit() {
            name="$1"
            shift
            "$@" > "closure-diagnostics/${name}.log" 2>&1
            echo "$?" > "closure-diagnostics/${name}.status"
          }
          run_audit r012-feature node tools/audit-r012-feature-boundaries.mjs
          run_audit r013-ui node tools/audit-r013-ui-system.mjs
          run_audit r006 node tools/audit-r006-closure.mjs
          run_audit r009-withdrawal node tools/audit-r009-withdrawal-completion.mjs
          run_audit p1-production bash scripts/verify-p1-production.sh
          run_audit p2-product bash scripts/verify-p2-product.sh
          run_audit p3-provider bash scripts/verify-p3-provider-readiness.sh
          run_audit p4 node tools/audit-p4-closure.mjs
          for file in closure-diagnostics/*.log; do
            echo "===== ${file} ====="
            cat "$file"
          done
      - name: Upload closure diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: closure-diagnostics
          path: closure-diagnostics
          if-no-files-found: error
          retention-days: 1
