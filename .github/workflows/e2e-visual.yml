name: E2E Visual Regression

on:
  workflow_dispatch:
    inputs:
      member_web_url:
        description: Member web URL
        required: true
        default: https://member-service.up.railway.app
      update_baselines:
        description: Generate fresh baseline screenshots instead of comparing
        required: true
        type: boolean
        default: false

jobs:
  public-auth-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate visual baselines
        if: ${{ inputs.update_baselines }}
        env:
          MEMBER_WEB_URL: ${{ inputs.member_web_url }}
        run: pnpm test:e2e:visual:update

      - name: Compare visual baselines
        if: ${{ !inputs.update_baselines }}
        env:
          MEMBER_WEB_URL: ${{ inputs.member_web_url }}
        run: pnpm test:e2e:visual

      - name: Upload visual report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: playwright-visual-report
          if-no-files-found: ignore

      - name: Upload screenshots and diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-results
          path: |
            test-results
            tests/e2e-visual/**/*-snapshots
          if-no-files-found: ignore
