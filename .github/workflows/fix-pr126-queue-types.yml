name: Repair PR 126 queue types

on:
  push:
    branches:
      - agent/admin-batch-dashboard-operations
    paths:
      - .github/workflows/fix-pr126-queue-types.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-batch-dashboard-operations
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply queue type repair
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("apps/web-admin/app/(admin)/operations/page.tsx")
          text = path.read_text()
          old_start = "const queueTasks = useMemo<QueueTask[]>(() => ["
          new_start = "const queueTasks = useMemo<QueueTask[]>(() => (["
          old_end = "].filter((task) => priorityFilter === 'all' || task.group === priorityFilter).sort((a, b) => (b.count > 0 ? b.priority : 0) - (a.count > 0 ? a.priority : 0)), [copy, failedTransfers, mismatchSnapshots, openRiskAlerts, pendingTopUps, pendingWithdrawals, priorityFilter, webhookFailed]);"
          new_end = "] satisfies QueueTask[]).filter((task) => priorityFilter === 'all' || task.group === priorityFilter).sort((a, b) => (b.count > 0 ? b.priority : 0) - (a.count > 0 ? a.priority : 0)), [copy, failedTransfers, mismatchSnapshots, openRiskAlerts, pendingTopUps, pendingWithdrawals, priorityFilter, webhookFailed]);"
          if old_start not in text or old_end not in text:
              raise SystemExit("expected queue expression not found")
          text = text.replace(old_start, new_start, 1).replace(old_end, new_end, 1)
          path.write_text(text)
          PY
          rm -f docs/pr126-typecheck.txt .github/workflows/fix-pr126-queue-types.yml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @platform/web-admin typecheck
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web-admin/app/'(admin)'/operations/page.tsx docs/pr126-typecheck.txt .github/workflows/fix-pr126-queue-types.yml
          git commit -m "fix(admin): preserve Operations queue literal types"
          git push origin HEAD:agent/admin-batch-dashboard-operations
