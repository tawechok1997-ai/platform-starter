name: R-008 Final Diagnostics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/r008-final-diagnostics.yml
      - .github/r008-final-*.txt

permissions:
  contents: write

concurrency:
  group: r008-final-diagnostics
  cancel-in-progress: false

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --prefer-offline

      - name: Run and capture all final gates
        id: gates
        shell: bash
        run: |
          set +e
          mkdir -p docs/evidence

          pnpm audit:r8-closure > docs/evidence/r008-audit.log 2>&1
          audit=$?
          pnpm typecheck:api > docs/evidence/r008-typecheck.log 2>&1
          typecheck=$?
          pnpm --filter @platform/api test -- --runInBand > docs/evidence/r008-tests.log 2>&1
          tests=$?
          pnpm build:api > docs/evidence/r008-build.log 2>&1
          build=$?

          echo "audit=$audit" >> "$GITHUB_OUTPUT"
          echo "typecheck=$typecheck" >> "$GITHUB_OUTPUT"
          echo "tests=$tests" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"

          cat > docs/evidence/r008-final-verification.md <<EOF
          # R-008 Final Verification

          Verified commit: \`${GITHUB_SHA}\`

          - Closure audit: $([ "$audit" -eq 0 ] && echo success || echo failure)
          - API typecheck: $([ "$typecheck" -eq 0 ] && echo success || echo failure)
          - Full API tests: $([ "$tests" -eq 0 ] && echo success || echo failure)
          - API build: $([ "$build" -eq 0 ] && echo success || echo failure)

          ## Failure tails

          ### Closure audit
          \`\`\`
          $(tail -n 80 docs/evidence/r008-audit.log)
          \`\`\`

          ### API typecheck
          \`\`\`
          $(tail -n 80 docs/evidence/r008-typecheck.log)
          \`\`\`

          ### Full API tests
          \`\`\`
          $(tail -n 80 docs/evidence/r008-tests.log)
          \`\`\`

          ### API build
          \`\`\`
          $(tail -n 80 docs/evidence/r008-build.log)
          \`\`\`
          EOF

      - name: Update closure documents
        if: steps.gates.outputs.audit == '0' && steps.gates.outputs.typecheck == '0' && steps.gates.outputs.tests == '0' && steps.gates.outputs.build == '0'
        env:
          R008_VERIFIED_COMMIT: ${{ github.sha }}
        run: node tools/close-r008-after-verification.mjs

      - name: Commit evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/evidence/r008-final-verification.md docs/r008-closure-checklist.md docs/master-worklist.md
          if git diff --cached --quiet; then
            echo "No R-008 evidence changes"
            exit 0
          fi
          if [ "${{ steps.gates.outputs.audit }}" = "0" ] && [ "${{ steps.gates.outputs.typecheck }}" = "0" ] && [ "${{ steps.gates.outputs.tests }}" = "0" ] && [ "${{ steps.gates.outputs.build }}" = "0" ]; then
            git commit -m "docs(r008): mark domain policy separation done [skip ci]"
          else
            git commit -m "docs(r008): persist final gate failure logs [skip ci]"
          fi
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Fail when any gate failed
        if: steps.gates.outputs.audit != '0' || steps.gates.outputs.typecheck != '0' || steps.gates.outputs.tests != '0' || steps.gates.outputs.build != '0'
        run: exit 1
