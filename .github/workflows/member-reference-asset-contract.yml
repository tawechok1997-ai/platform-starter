name: Member Reference Asset Contract

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/member-reference-asset-contract.yml
      - docs/member-reference-asset-intake.md
      - docs/member-reference-assets.manifest.json
      - tools/verify-member-reference-assets.mjs
      - tools/verify-member-reference-assets.test.mjs
  push:
    branches:
      - main
    paths:
      - .github/workflows/member-reference-asset-contract.yml
      - docs/member-reference-asset-intake.md
      - docs/member-reference-assets.manifest.json
      - tools/verify-member-reference-assets.mjs
      - tools/verify-member-reference-assets.test.mjs

permissions:
  contents: read

concurrency:
  group: member-reference-asset-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify intake contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run verifier tests
        run: node --test tools/verify-member-reference-assets.test.mjs

      - name: Confirm empty intake fails closed
        shell: bash
        run: |
          set -euo pipefail
          empty_dir="$(mktemp -d)"
          trap 'rm -rf "$empty_dir"' EXIT
          if node tools/verify-member-reference-assets.mjs "$empty_dir" --json > reference-asset-empty-report.json; then
            echo 'Expected an empty intake to fail.' >&2
            exit 1
          fi

      - name: Upload fail-closed evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: member-reference-asset-contract-${{ github.sha }}
          path: reference-asset-empty-report.json
          if-no-files-found: error
          retention-days: 7
