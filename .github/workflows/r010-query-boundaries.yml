name: R-010 Query Boundaries

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/src/common/query/**'
      - 'apps/api/src/modules/notifications/**'
      - 'apps/api/src/modules/reports/**'
      - 'apps/api/src/**/*.service.ts'
      - 'apps/api/src/**/*.repository.ts'
      - 'apps/api/src/**/dto/**'
      - 'tools/audit-r010-*.mjs'
      - 'docs/evidence/r010-query-review.json'
      - '.github/workflows/r010-query-boundaries.yml'
  pull_request:
    paths:
      - 'apps/api/src/common/query/**'
      - 'apps/api/src/modules/notifications/**'
      - 'apps/api/src/modules/reports/**'
      - 'apps/api/src/**/*.service.ts'
      - 'apps/api/src/**/*.repository.ts'
      - 'apps/api/src/**/dto/**'
      - 'tools/audit-r010-*.mjs'
      - 'docs/evidence/r010-query-review.json'
      - '.github/workflows/r010-query-boundaries.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Query review ledger
        run: node tools/audit-r010-query-review-ledger.mjs
      - name: Notification query ownership
        run: node tools/audit-r010-notification-query-ownership.mjs
      - name: Notification projection boundaries
        run: node tools/audit-r010-notification-projection-boundaries.mjs
      - name: Admin member list projection
        run: node tools/audit-r010-admin-member-list-projection.mjs
      - name: Shared cursor pagination
        run: node tools/audit-r010-cursor-pagination.mjs
      - name: Shared filter and sort boundaries
        run: node tools/audit-r010-filter-sort-boundaries.mjs
      - name: Strict query rejection contracts
        run: pnpm --filter @platform/api test -- src/common/query/query-filters.spec.ts --runInBand
      - name: Dashboard read model
        run: node tools/audit-r010-dashboard-read-model.mjs
      - name: Report read model
        run: node tools/audit-r010-report-read-model.mjs
      - name: API typecheck
        run: pnpm typecheck:api
