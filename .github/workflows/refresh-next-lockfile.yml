name: Refresh Next.js lockfile

on:
  push:
    branches:
      - agent/fix-next-security
    paths:
      - package.json
      - apps/web-admin/package.json
      - apps/web-member/package.json

permissions:
  contents: write

jobs:
  refresh-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-next-security
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: refresh lockfile for Next.js security update"
          git push
