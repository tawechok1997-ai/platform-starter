name: One-shot Admin Growth Batch Sync

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/admin-growth-batch-sync.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Harden commission workflow and sync verified worklist
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          page = Path('apps/web-admin/app/(admin)/commission-ledgers/page.tsx')
          text = page.read_text(encoding='utf-8')
          replacements = [
            ("AdminPage, AdminRow, AdminStack, AdminToolbar", "AdminPage, AdminRow, AdminSkeleton, AdminStack, AdminToolbar"),
            ("  const [pendingAction, setPendingAction] = useState<PendingAction>(null);", "  const [pendingAction, setPendingAction] = useState<PendingAction>(null);\n  const [loading, setLoading] = useState(true);"),
            ("  async function load() {\n    setMessage('กำลังโหลด commission...');", "  async function load() {\n    setLoading(true);\n    setMessage('กำลังโหลด commission...');"),
            ("    } catch {\n      setMessage('โหลด commission ไม่สำเร็จ กรุณาลองใหม่');\n    }\n  }", "    } catch {\n      setItems([]);\n      setMessage('โหลด commission ไม่สำเร็จ กรุณาลองใหม่');\n    } finally {\n      setLoading(false);\n    }\n  }"),
            ("  async function create() {", "  function requestCreate() {\n    if (!agentProfileId || Number(basisAmount) <= 0) { setMessage('กรุณาเลือกตัวแทนและใส่ basis amount'); return; }\n    if (!preview) { setMessage('กรุณากด Preview และตรวจสูตรก่อนสร้าง Ledger'); return; }\n    setMessage('');\n    setPendingAction({ kind: 'create' });\n  }\n\n  function requestReview(item: Commission, next: 'APPROVED' | 'REJECTED') {\n    if (item.status === 'APPROVED' || item.status === 'REJECTED') { setMessage('รายการนี้ปิดการตรวจแล้ว'); return; }\n    if (next === 'REJECTED' && !rejectReason.trim()) { setMessage('กรุณาใส่เหตุผลที่ปฏิเสธก่อนยืนยัน'); return; }\n    setMessage('');\n    setPendingAction({ kind: 'review', id: item.id, next });\n  }\n\n  async function create() {"),
            ("actions={<AdminButton disabled={Boolean(busyId)} onClick={() => void load()}>รีเฟรช</AdminButton>}", "actions={<AdminButton disabled={loading || Boolean(busyId)} onClick={() => void load()}>{loading ? 'กำลังโหลด...' : 'รีเฟรช'}</AdminButton>}"),
            ("    {message && <AdminNotice>{message}</AdminNotice>}", "    {message && <AdminNotice tone={message.includes('ไม่สำเร็จ') || message.includes('กรุณา') || message.includes('ปิดการตรวจ') ? 'danger' : 'neutral'}>{message}</AdminNotice>}"),
            ("<select value={agentProfileId} onChange=", "<select aria-label=\"เลือกตัวแทน\" disabled={loading || Boolean(busyId)} value={agentProfileId} onChange="),
            ("<input type=\"number\" value={basisAmount}", "<input aria-label=\"Basis amount\" disabled={loading || Boolean(busyId)} type=\"number\" value={basisAmount}"),
            ("<input type=\"number\" value={ratePercent}", "<input aria-label=\"Commission rate percent\" disabled={loading || Boolean(busyId)} type=\"number\" value={ratePercent}"),
            ("<input type=\"number\" value={capAmount}", "<input aria-label=\"Commission cap amount\" disabled={loading || Boolean(busyId)} type=\"number\" value={capAmount}"),
            ("<input value={basis} onChange=", "<input aria-label=\"Commission basis\" disabled={loading || Boolean(busyId)} value={basis} onChange="),
            ("<input type=\"number\" value={amount}", "<input aria-label=\"Final commission amount\" disabled={loading || Boolean(busyId)} type=\"number\" value={amount}"),
            ("<input value={note} onChange=", "<input aria-label=\"Commission note\" disabled={loading || Boolean(busyId)} value={note} onChange="),
            ("onClick={() => setPendingAction({ kind: 'create' })}", "onClick={requestCreate}"),
            ("<AdminToolbar><select value={status}", "<AdminToolbar><select aria-label=\"กรอง Commission ตามสถานะ\" disabled={loading || Boolean(busyId)} value={status}"),
            ("<input value={rejectReason}", "<input aria-label=\"เหตุผลที่ปฏิเสธ Commission\" disabled={loading || Boolean(busyId)} value={rejectReason}"),
            ("onClick={() => setPendingAction({ kind: 'review', id: item.id, next: 'APPROVED' })}", "onClick={() => requestReview(item, 'APPROVED')}"),
            ("onClick={() => setPendingAction({ kind: 'review', id: item.id, next: 'REJECTED' })}", "onClick={() => requestReview(item, 'REJECTED')}"),
            ("<AdminGrid>{items.map", "{loading && items.length === 0 ? <AdminSkeleton lines={6} /> : <AdminGrid>{items.map"),
            ("{items.length === 0 && <AdminEmpty>ยังไม่มี commission ledger</AdminEmpty>}</AdminGrid>", "{!loading && items.length === 0 && <AdminEmpty>ยังไม่มี commission ledger</AdminEmpty>}</AdminGrid>}"),
            ("onCancel={() => setPendingAction(null)}", "onCancel={() => { if (!busyId) setPendingAction(null); }}"),
          ]
          for old, new in replacements:
            if old not in text:
              raise SystemExit(f'Expected commission text not found: {old!r}')
            text = text.replace(old, new, 1)
          page.write_text(text, encoding='utf-8')

          worklist = Path('docs/admin-modernization-chat-worklist.md')
          text = worklist.read_text(encoding='utf-8')
          replacements = [
            ('- [~] ภาษาและ shared components ยังไม่สม่ำเสมอ', '- [x] ภาษา, loading, partial-error visibility และ shared components สม่ำเสมอ'),
            ('- [ ] Campaign readiness checklist\n- [ ] Request priority\n- [ ] Member preview\n- [~] Campaign status มีผ่าน Promotion Center แต่ยังไม่ยืนยัน route นี้ครบ', '- [x] Campaign readiness checklist\n- [x] Request priority\n- [x] Member preview\n- [x] Draft/Published/Archived และ Member visibility boundary'),
            ('- [~] Async guards และ safe error ยังไม่ครบทุก mutation', '- [x] Async guards, double-submit protection และ safe error ครบทุก mutation'),
            ('- [~] Nested tree/shared confirmation/error handling ยังไม่ครบ', '- [x] Nested tree, shared confirmation และ async error handling'),
            ('- [~] Reject reason และ shared confirmation ยังไม่สมบูรณ์', '- [x] Reject reason, preview-before-create และ shared confirmation'),
          ]
          for old, new in replacements:
            if old not in text:
              raise SystemExit(f'Expected worklist text not found: {old!r}')
            text = text.replace(old, new, 1)
          worklist.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-shot workflow
        run: rm .github/workflows/admin-growth-batch-sync.yml

      - name: Commit verified batch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web-admin/app/'(admin)'/commission-ledgers/page.tsx docs/admin-modernization-chat-worklist.md .github/workflows/admin-growth-batch-sync.yml
          git commit -m "feat(admin): harden commission review and sync growth worklist"
          git push
