name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate shell scripts
        run: bash -n scripts/*.sh

      - name: Validate Prisma schema
        run: pnpm prisma validate

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Test API
        run: pnpm --filter @platform/api test -- --runInBand

      - name: Build API
        run: pnpm build:api

      - name: Test API
        run: pnpm --filter @platform/api test -- --runInBand

      - name: Build Admin Web
        run: pnpm build:web-admin
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Build Member Web
        run: pnpm build:web-member
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
