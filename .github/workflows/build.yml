name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: platform_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d platform_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_ci?schema=public
      FINANCE_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_ci?schema=public
      RISK_MATCH_SECRET: ci-risk-match-secret-value-2026
      KYC_ACCESS_SECRET: ci-kyc-access-secret-value-2026
      PHONE_OTP_SECRET: ci-phone-otp-secret-value-2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Validate shell scripts
        run: bash -n scripts/*.sh

      - name: Audit architecture inventory
        run: pnpm audit:architecture-inventory

      - name: Audit architecture boundaries
        run: pnpm audit:architecture-boundaries

      - name: Audit critical regression safety
        run: pnpm audit:critical-test-safety

      - name: Audit admin API permissions
        run: pnpm audit:admin-permissions

      - name: Audit admin UI permissions
        run: pnpm audit:admin-ui-permissions

      - name: Validate Prisma schema
        run: pnpm prisma validate

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Bootstrap disposable CI PostgreSQL schema
        # The committed migration history is a production baseline that assumes
        # core tables such as users already exist. For a fresh, throwaway CI
        # database, materialize the current schema directly instead of replaying
        # that partial history. Production deploys continue to use migrate deploy.
        run: pnpm prisma db push --skip-generate

      - name: Apply SQL-first domain migrations to disposable CI PostgreSQL
        # Prisma accepts ?schema=public, while psql/libpq does not. Strip the query
        # only for direct psql calls and preserve DATABASE_URL for Prisma commands.
        run: |
          PSQL_DATABASE_URL="${DATABASE_URL%%\?*}"
          psql "$PSQL_DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/migrations/20260714190000_add_promotion_domain_models/migration.sql
          psql "$PSQL_DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/migrations/20260714191000_backfill_promotion_domain_models/migration.sql
          psql "$PSQL_DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/migrations/20260714213000_add_risk_watchlist_domain/migration.sql
          psql "$PSQL_DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/migrations/20260714213000_add_watchlist_risk_alert_type/migration.sql
          psql "$PSQL_DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/migrations/20260714230000_add_kyc_document_domain/migration.sql
          psql "$PSQL_DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/migrations/20260714230000_add_phone_otp_verification/migration.sql

      - name: Test API
        id: test_api
        run: pnpm --filter @platform/api test -- --runInBand

      - name: Test PostgreSQL finance concurrency
        id: test_finance
        run: pnpm --filter @platform/api test:db:finance -- --runInBand

      - name: Test PostgreSQL promotion settlement concurrency
        id: test_promotions
        run: pnpm --filter @platform/api test:db:promotions -- --runInBand

      - name: Test PostgreSQL phone OTP security
        id: test_phone_otp
        run: pnpm --filter @platform/api test:db:phone-otp -- --runInBand

      - name: Test PostgreSQL risk watchlist concurrency
        id: test_risk_watchlist
        run: pnpm --filter @platform/api test:db:risk-watchlist -- --runInBand

      - name: Test PostgreSQL KYC concurrency
        id: test_kyc
        run: pnpm --filter @platform/api test:db:kyc -- --runInBand

      - name: Regression test summary
        if: always()
        run: |
          {
            echo "## Regression safety summary"
            echo ""
            echo "| Suite | Result |"
            echo "|---|---|"
            echo "| API unit/integration | ${{ steps.test_api.outcome }} |"
            echo "| Finance DB/concurrency | ${{ steps.test_finance.outcome }} |"
            echo "| Promotion settlement DB | ${{ steps.test_promotions.outcome }} |"
            echo "| Phone OTP security DB | ${{ steps.test_phone_otp.outcome }} |"
            echo "| Risk watchlist DB | ${{ steps.test_risk_watchlist.outcome }} |"
            echo "| KYC lifecycle DB | ${{ steps.test_kyc.outcome }} |"
            echo ""
            echo "Failed or cancelled suites must be resolved before structural refactors merge."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build API
        run: pnpm build:api

      - name: Build Admin Web
        run: pnpm build:web-admin
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Build Member Web
        run: pnpm build:web-member
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000