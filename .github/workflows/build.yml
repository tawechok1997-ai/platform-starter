name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: platform_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d platform_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_ci?schema=public
      FINANCE_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # The workspace manifests currently include packages added after the last
        # committed lockfile refresh. Allow pnpm to reconcile the lockfile in CI
        # so schema/tests/builds can run; restore frozen mode after committing the
        # regenerated pnpm-lock.yaml.
        run: pnpm install --frozen-lockfile=false

      - name: Validate shell scripts
        run: bash -n scripts/*.sh

      - name: Validate Prisma schema
        run: pnpm prisma validate

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Apply migrations to CI PostgreSQL
        run: pnpm prisma migrate deploy

      - name: Test API
        run: pnpm --filter @platform/api test -- --runInBand

      - name: Test PostgreSQL finance concurrency
        run: pnpm --filter @platform/api test:db:finance -- --runInBand

      - name: Build API
        run: pnpm build:api

      - name: Build Admin Web
        run: pnpm build:web-admin
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Build Member Web
        run: pnpm build:web-member
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
