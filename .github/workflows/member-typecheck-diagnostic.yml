name: Member Typecheck Diagnostic

on:
  pull_request:
    paths:
      - 'apps/web-member/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/member-typecheck-diagnostic.yml'

permissions:
  contents: read

jobs:
  member-typecheck-diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies quietly
        run: pnpm install --frozen-lockfile --reporter=silent
      - name: Capture Member typecheck diagnostics
        shell: bash
        run: |
          set +e
          pnpm --filter @platform/web-member typecheck > member-typecheck.log 2>&1
          echo "$?" > member-typecheck.status
          grep -E "error TS[0-9]+|Type error:|Failed to compile|Cannot find|is not assignable|does not exist" member-typecheck.log > member-typecheck-errors.log || true
      - name: Upload Member typecheck diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: member-typecheck-diagnostics
          path: |
            member-typecheck.log
            member-typecheck-errors.log
            member-typecheck.status
          if-no-files-found: error
          retention-days: 1
      - name: Fail when Member typecheck failed
        shell: bash
        run: |
          status="$(cat member-typecheck.status)"
          cat member-typecheck-errors.log || true
          exit "$status"
