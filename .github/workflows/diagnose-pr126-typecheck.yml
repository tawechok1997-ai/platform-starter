name: Diagnose PR 126 typecheck

on:
  push:
    branches:
      - agent/admin-batch-dashboard-operations
    paths:
      - .github/workflows/diagnose-pr126-typecheck.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-batch-dashboard-operations
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck output
        run: |
          set +e
          pnpm --filter @platform/web-admin typecheck > docs/pr126-typecheck.txt 2>&1
          status=$?
          echo "exit_code=$status" >> docs/pr126-typecheck.txt
          rm .github/workflows/diagnose-pr126-typecheck.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/pr126-typecheck.txt .github/workflows/diagnose-pr126-typecheck.yml
          git commit -m "chore(ci): record PR 126 typecheck diagnostics"
          git push origin HEAD:agent/admin-batch-dashboard-operations
