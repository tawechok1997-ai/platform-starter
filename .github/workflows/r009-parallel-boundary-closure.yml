name: R-009 Parallel Boundary Closure

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/src/common/infrastructure/**'
      - 'apps/api/src/common/application/critical-repository-ports.ts'
      - 'apps/api/src/modules/admin-access/admin-access.service.ts'
      - 'apps/api/src/modules/admin-access/admin-ownership-command.service.ts'
      - 'apps/api/src/modules/admin-access/admin-ownership-command.service.spec.ts'
      - 'apps/api/src/modules/finance/finance-concurrency.db.spec.ts'
      - 'apps/api/src/modules/risk-alerts/kyc-review-command.service.ts'
      - 'apps/api/src/modules/risk-alerts/kyc-concurrency.db.spec.ts'
      - 'apps/api/src/modules/risk-alerts/risk-watchlist.service.ts'
      - 'apps/api/src/modules/risk-alerts/risk-watchlist-concurrency.db.spec.ts'
      - 'apps/api/src/modules/promotions/settlement-command.service.ts'
      - 'apps/api/src/modules/promotions/settlement-command.service.spec.ts'
      - 'apps/api/src/modules/promotions/promotion-settlement.db.spec.ts'
      - 'prisma/schema.prisma'
      - 'prisma/migrations/**'
      - 'docs/evidence/r009-transaction-escape-review.json'
      - 'tools/audit-r009-row-lock-helpers.mjs'
      - 'tools/audit-r009-transaction-context.mjs'
      - 'tools/audit-r009-transaction-escapes.mjs'
      - 'tools/audit-r009-transaction-review-ledger.mjs'
      - 'tools/audit-r009-admin-invitation-transaction.mjs'
      - 'tools/audit-r009-ownership-transfer-transaction.mjs'
      - 'tools/audit-r009-kyc-watchlist-transactions.mjs'
      - 'tools/audit-r009-promotion-settlement-transaction.mjs'
      - 'tools/audit-r009-risk-promotion-adapters.mjs'
      - 'tools/audit-r009-critical-constraint-closure.mjs'
      - '.github/workflows/r009-parallel-boundary-closure.yml'
  pull_request:
    paths:
      - 'apps/api/src/common/infrastructure/**'
      - 'apps/api/src/common/application/critical-repository-ports.ts'
      - 'apps/api/src/modules/admin-access/admin-access.service.ts'
      - 'apps/api/src/modules/admin-access/admin-ownership-command.service.ts'
      - 'apps/api/src/modules/admin-access/admin-ownership-command.service.spec.ts'
      - 'apps/api/src/modules/finance/finance-concurrency.db.spec.ts'
      - 'apps/api/src/modules/risk-alerts/kyc-review-command.service.ts'
      - 'apps/api/src/modules/risk-alerts/kyc-concurrency.db.spec.ts'
      - 'apps/api/src/modules/risk-alerts/risk-watchlist.service.ts'
      - 'apps/api/src/modules/risk-alerts/risk-watchlist-concurrency.db.spec.ts'
      - 'apps/api/src/modules/promotions/settlement-command.service.ts'
      - 'apps/api/src/modules/promotions/settlement-command.service.spec.ts'
      - 'apps/api/src/modules/promotions/promotion-settlement.db.spec.ts'
      - 'prisma/schema.prisma'
      - 'prisma/migrations/**'
      - 'docs/evidence/r009-transaction-escape-review.json'
      - 'tools/audit-r009-row-lock-helpers.mjs'
      - 'tools/audit-r009-transaction-context.mjs'
      - 'tools/audit-r009-transaction-escapes.mjs'
      - 'tools/audit-r009-transaction-review-ledger.mjs'
      - 'tools/audit-r009-admin-invitation-transaction.mjs'
      - 'tools/audit-r009-ownership-transfer-transaction.mjs'
      - 'tools/audit-r009-kyc-watchlist-transactions.mjs'
      - 'tools/audit-r009-promotion-settlement-transaction.mjs'
      - 'tools/audit-r009-risk-promotion-adapters.mjs'
      - 'tools/audit-r009-critical-constraint-closure.mjs'
      - '.github/workflows/r009-parallel-boundary-closure.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: platform_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d platform_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_ci?schema=public
      FINANCE_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Prepare isolated PostgreSQL schema
        run: pnpm db:migrate
      - name: Row-lock helper closure
        run: node tools/audit-r009-row-lock-helpers.mjs
      - name: Transaction-context guard
        run: node tools/audit-r009-transaction-context.mjs
      - name: Transaction review ledger validation
        run: node tools/audit-r009-transaction-review-ledger.mjs
      - name: Strict transaction escape inventory
        env:
          R009_TRANSACTION_STRICT: '1'
        run: node tools/audit-r009-transaction-escapes.mjs
      - name: Admin invitation transaction closure
        run: node tools/audit-r009-admin-invitation-transaction.mjs
      - name: Ownership transfer transaction closure
        run: node tools/audit-r009-ownership-transfer-transaction.mjs
      - name: Ownership concurrency regression
        run: pnpm --filter @platform/api test -- admin-ownership-command.service.spec.ts --runInBand
      - name: PostgreSQL finance concurrency regression
        run: pnpm --filter @platform/api test:db:finance
      - name: PostgreSQL promotion settlement concurrency regression
        run: pnpm --filter @platform/api test:db:promotions
      - name: PostgreSQL KYC concurrency regression
        run: pnpm --filter @platform/api test:db:kyc
      - name: PostgreSQL risk-watchlist concurrency regression
        run: pnpm --filter @platform/api test:db:risk-watchlist
      - name: KYC and watchlist transaction closure
        run: node tools/audit-r009-kyc-watchlist-transactions.mjs
      - name: Risk and promotion repository adapters
        run: node tools/audit-r009-risk-promotion-adapters.mjs
      - name: Promotion settlement transaction closure
        run: node tools/audit-r009-promotion-settlement-transaction.mjs
      - name: Promotion settlement command regression
        run: pnpm --filter @platform/api test -- settlement-command.service.spec.ts --runInBand
      - name: Critical constraint closure
        run: node tools/audit-r009-critical-constraint-closure.mjs
      - name: Repository type boundary
        run: pnpm audit:r9-repository-boundaries:strict
      - name: API typecheck
        run: pnpm typecheck:api
