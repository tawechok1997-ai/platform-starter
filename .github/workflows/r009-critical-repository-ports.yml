name: R-009 Critical Repository Ports

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-ports:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Verify critical repository ports
        run: node tools/audit-r009-critical-repository-ports.mjs
      - name: Verify repository type boundary
        run: pnpm audit:r9-repository-boundaries:strict
      - name: Typecheck API
        run: pnpm typecheck:api
