name: Apply R-008 Withdrawal Wallet Policies

on:
  push:
    branches: [main]
    paths:
      - tools/trigger-r008-withdrawal-wallet.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: r008-withdrawal-wallet-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply policy integration
        run: node tools/apply-r008-withdrawal-wallet-integration.mjs
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Verify R-008 policies
        run: |
          pnpm audit:r8-closure
          pnpm typecheck:api
          pnpm --filter @platform/api exec jest --runInBand
          pnpm build:api
      - name: Commit verified integration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/modules/withdrawals/withdrawals.service.ts
          if git diff --cached --quiet; then
            echo 'Integration already present.'
          else
            git commit -m 'refactor(r008): enforce withdrawal and wallet settlement policies [skip ci]'
            git pull --rebase origin main
            git push origin HEAD:main
          fi
