name: Close R-004 and R-005

on:
  push:
    branches: [main]
    paths:
      - tools/trigger-r004-r005-closure.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  close:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Verify R-004 closure
        run: pnpm audit:r4-closure
      - name: Verify R-005 closure
        run: pnpm audit:r5-closure
      - name: Sync master worklist
        run: node tools/sync-r004-r005-worklist.mjs
      - name: Commit closure status
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/master-project-worklist.md
          if git diff --cached --quiet; then
            echo 'Master worklist already synchronized.'
          else
            git commit -m 'docs(worklist): close R-004 and R-005 [skip ci]'
            git pull --rebase origin main
            git push origin HEAD:main
          fi
