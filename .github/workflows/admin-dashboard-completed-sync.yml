name: Admin Dashboard Completed Sync

on:
  push:
    branches: [main]
    paths:
      - 'docs/.admin-dashboard-completed-trigger'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync completed dashboard worklist items
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/admin-modernization-chat-worklist.md')
          text = path.read_text()
          replacements = {
              '- [ ] Wallet total ไม่ตัดบรรทัด': '- [x] Wallet total ไม่ตัดบรรทัด',
              '- [ ] Recent Ledger 5 รายการ + ดูทั้งหมด': '- [x] Recent Ledger 5 รายการ + ดูทั้งหมด',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected worklist item not found: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Remove temporary automation files
        run: |
          rm -f docs/.admin-dashboard-completed-trigger
          rm -f .github/workflows/admin-dashboard-completed-sync.yml
      - name: Commit result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/admin-modernization-chat-worklist.md docs/.admin-dashboard-completed-trigger .github/workflows/admin-dashboard-completed-sync.yml
          git commit -m 'docs(admin): mark completed dashboard items'
          git push
