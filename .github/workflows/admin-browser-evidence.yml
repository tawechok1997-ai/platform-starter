name: Admin Browser Evidence

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web-admin/**'
      - '.github/workflows/admin-browser-evidence.yml'

permissions:
  contents: read

concurrency:
  group: admin-browser-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-evidence:
    name: Capture every Admin route on mobile and desktop
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ADMIN_BASE_URL: ${{ secrets.ADMIN_BASE_URL || 'https://platformweb-admin-production.up.railway.app' }}
      ADMIN_TEST_USERNAME: ${{ secrets.ADMIN_TEST_USERNAME }}
      ADMIN_TEST_PASSWORD: ${{ secrets.ADMIN_TEST_PASSWORD }}
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install repository dependencies
        run: pnpm install --frozen-lockfile

      - name: Install temporary browser-test dependencies
        run: pnpm add -Dw @playwright/test@1.55.1 @axe-core/playwright@4.10.2 --lockfile=false

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Create evidence test
        shell: bash
        run: |
          mkdir -p .admin-browser-evidence
          cat > .admin-browser-evidence/admin-evidence.spec.ts <<'EOF'
          import { test, expect, type Browser, type BrowserContext, type Page } from '@playwright/test';
          import AxeBuilder from '@axe-core/playwright';
          import fs from 'node:fs';
          import path from 'node:path';

          const baseURL = process.env.ADMIN_BASE_URL!;
          const username = process.env.ADMIN_TEST_USERNAME;
          const password = process.env.ADMIN_TEST_PASSWORD;
          const evidenceDir = path.resolve('artifacts/admin-browser-evidence');
          fs.mkdirSync(evidenceDir, { recursive: true });

          const devices = [
            { name: 'mobile-390x844', width: 390, height: 844, mobile: true },
            { name: 'desktop-1440x900', width: 1440, height: 900, mobile: false },
          ];

          const blockedPrefixes = ['/logout', '/api', '/_next'];

          function slugFor(route: string) {
            return route === '/' ? 'root' : route.replace(/^\/+/, '').replace(/[^a-zA-Z0-9-_]+/g, '-').replace(/-+/g, '-');
          }

          function attachRuntimeGuards(page: Page) {
            const consoleErrors: string[] = [];
            const failedRequests: string[] = [];
            page.on('console', (message) => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });
            page.on('requestfailed', (request) => {
              failedRequests.push(`${request.method()} ${request.url()} :: ${request.failure()?.errorText ?? 'failed'}`);
            });
            return { consoleErrors, failedRequests };
          }

          async function login(page: Page) {
            test.skip(!username || !password, 'Authenticated crawl requires ADMIN_TEST_USERNAME and ADMIN_TEST_PASSWORD secrets.');
            await page.goto(`${baseURL}/login?next=%2Fdashboard`, { waitUntil: 'networkidle' });
            const userInput = page.locator('input[name="username"], input[name="email"], input[type="email"], input[autocomplete="username"]').first();
            const passwordInput = page.locator('input[name="password"], input[type="password"], input[autocomplete="current-password"]').first();
            await expect(userInput).toBeVisible();
            await expect(passwordInput).toBeVisible();
            await userInput.fill(username!);
            await passwordInput.fill(password!);
            await page.locator('button[type="submit"], input[type="submit"]').first().click();
            await page.waitForURL((url) => !url.pathname.startsWith('/login'), { timeout: 20_000 });
            await page.waitForLoadState('networkidle');
          }

          async function collectRoutes(page: Page) {
            const discovered = new Set<string>(['/dashboard']);
            for (let pass = 0; pass < 3; pass += 1) {
              const hrefs = await page.locator('a[href]').evaluateAll((anchors) => anchors.map((anchor) => (anchor as HTMLAnchorElement).getAttribute('href') || ''));
              for (const href of hrefs) {
                try {
                  const url = new URL(href, baseURL);
                  if (url.origin !== new URL(baseURL).origin) continue;
                  if (!url.pathname.startsWith('/')) continue;
                  if (blockedPrefixes.some((prefix) => url.pathname.startsWith(prefix))) continue;
                  if (url.pathname.startsWith('/login')) continue;
                  discovered.add(url.pathname);
                } catch {
                  // Ignore malformed hrefs.
                }
              }
              const groupTriggers = page.locator('button[aria-expanded="false"]');
              const count = await groupTriggers.count();
              for (let index = 0; index < count; index += 1) {
                await groupTriggers.nth(index).click().catch(() => undefined);
              }
              await page.waitForTimeout(250);
            }
            return [...discovered].sort();
          }

          async function createAuthenticatedContext(browser: Browser, device: typeof devices[number]) {
            const context = await browser.newContext({
              viewport: { width: device.width, height: device.height },
              reducedMotion: 'reduce',
              isMobile: device.mobile,
              hasTouch: device.mobile,
            });
            const page = await context.newPage();
            await login(page);
            return { context, page };
          }

          test('public states and accessibility evidence', async ({ browser }) => {
            for (const device of devices) {
              const context = await browser.newContext({
                viewport: { width: device.width, height: device.height },
                reducedMotion: 'reduce',
                isMobile: device.mobile,
                hasTouch: device.mobile,
              });
              const page = await context.newPage();
              const guards = attachRuntimeGuards(page);

              await page.goto(`${baseURL}/login`, { waitUntil: 'networkidle' });
              await page.screenshot({ path: path.join(evidenceDir, `${device.name}-login.png`), fullPage: true });

              await page.goto(`${baseURL}/__admin-evidence-not-found`, { waitUntil: 'networkidle' });
              await page.screenshot({ path: path.join(evidenceDir, `${device.name}-not-found.png`), fullPage: true });

              const accessibility = await new AxeBuilder({ page }).analyze();
              fs.writeFileSync(path.join(evidenceDir, `${device.name}-public-axe.json`), JSON.stringify(accessibility, null, 2));
              fs.writeFileSync(path.join(evidenceDir, `${device.name}-public-console-errors.json`), JSON.stringify(guards.consoleErrors, null, 2));
              fs.writeFileSync(path.join(evidenceDir, `${device.name}-public-failed-requests.json`), JSON.stringify(guards.failedRequests, null, 2));
              expect(accessibility.violations.filter((violation) => ['critical', 'serious'].includes(violation.impact ?? ''))).toEqual([]);
              expect(guards.consoleErrors).toEqual([]);
              await context.close();
            }
          });

          test('crawl and capture every authenticated Admin route', async ({ browser }) => {
            test.skip(!username || !password, 'Authenticated crawl requires repository secrets.');

            const routeManifest: Record<string, { url: string; status: number | null; title: string; consoleErrors: string[]; failedRequests: string[] }[]> = {};
            let canonicalRoutes: string[] = [];

            for (const device of devices) {
              const { context, page } = await createAuthenticatedContext(browser, device);
              if (canonicalRoutes.length === 0) canonicalRoutes = await collectRoutes(page);
              routeManifest[device.name] = [];

              for (const route of canonicalRoutes) {
                const guards = attachRuntimeGuards(page);
                const response = await page.goto(`${baseURL}${route}`, { waitUntil: 'networkidle', timeout: 30_000 }).catch(() => null);
                await page.waitForTimeout(350);
                const currentPath = new URL(page.url()).pathname;
                const slug = slugFor(route);
                await page.screenshot({ path: path.join(evidenceDir, device.name, `${slug}.png`), fullPage: true });

                const axe = await new AxeBuilder({ page }).analyze();
                fs.mkdirSync(path.join(evidenceDir, device.name, 'axe'), { recursive: true });
                fs.writeFileSync(path.join(evidenceDir, device.name, 'axe', `${slug}.json`), JSON.stringify(axe, null, 2));

                routeManifest[device.name].push({
                  url: currentPath,
                  status: response?.status() ?? null,
                  title: await page.title(),
                  consoleErrors: guards.consoleErrors,
                  failedRequests: guards.failedRequests,
                });

                expect(currentPath.startsWith('/login'), `${route} redirected to login`).toBe(false);
                expect(response?.status() ?? 200, `${route} returned an error status`).toBeLessThan(500);
                expect(axe.violations.filter((violation) => ['critical', 'serious'].includes(violation.impact ?? '')), `${route} has serious accessibility violations`).toEqual([]);
              }

              await context.close();
            }

            fs.writeFileSync(path.join(evidenceDir, 'routes.json'), JSON.stringify(canonicalRoutes, null, 2));
            fs.writeFileSync(path.join(evidenceDir, 'route-manifest.json'), JSON.stringify(routeManifest, null, 2));
            fs.writeFileSync(
              path.join(evidenceDir, 'ROUTE-SUMMARY.md'),
              ['# Admin route evidence', '', `Total routes: ${canonicalRoutes.length}`, '', ...canonicalRoutes.map((route) => `- ${route}`)].join('\n'),
            );
          });

          test('keyboard focus and 200 percent zoom evidence', async ({ page }) => {
            await page.goto(`${baseURL}/login`, { waitUntil: 'networkidle' });
            await page.evaluate(() => { document.documentElement.style.zoom = '200%'; });
            await page.keyboard.press('Tab');
            const activeTag = await page.evaluate(() => document.activeElement?.tagName ?? '');
            expect(['INPUT', 'BUTTON', 'A']).toContain(activeTag);
            await page.screenshot({ path: path.join(evidenceDir, 'login-zoom-200-keyboard-focus.png'), fullPage: true });
          });
          EOF

          cat > .admin-browser-evidence/playwright.config.ts <<'EOF'
          import { defineConfig } from '@playwright/test';

          export default defineConfig({
            testDir: '.',
            testMatch: /admin-evidence\.spec\.ts/,
            timeout: 20 * 60_000,
            expect: { timeout: 15_000 },
            retries: 1,
            workers: 1,
            reporter: [
              ['list'],
              ['html', { outputFolder: '../artifacts/playwright-report', open: 'never' }],
            ],
            use: {
              browserName: 'chromium',
              trace: 'retain-on-failure',
              screenshot: 'only-on-failure',
              video: 'retain-on-failure',
              ignoreHTTPSErrors: false,
            },
            outputDir: '../artifacts/test-results',
          });
          EOF

      - name: Run Admin browser evidence
        run: pnpm exec playwright test --config .admin-browser-evidence/playwright.config.ts

      - name: Write evidence summary
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/admin-browser-evidence
          {
            echo "# Admin Browser Evidence"
            echo
            echo "- Commit: $GITHUB_SHA"
            echo "- Base URL: $ADMIN_BASE_URL"
            echo "- Devices: mobile 390x844 and desktop 1440x900"
            echo "- Authenticated secrets configured: $([[ -n \"$ADMIN_TEST_USERNAME\" && -n \"$ADMIN_TEST_PASSWORD\" ]] && echo yes || echo no)"
            echo "- Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } > artifacts/admin-browser-evidence/SUMMARY.md

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-browser-evidence-${{ github.sha }}
          path: artifacts
          if-no-files-found: error
          retention-days: 30
