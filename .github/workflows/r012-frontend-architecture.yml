name: R012 Frontend Architecture

on:
  pull_request:
    paths:
      - 'apps/web-admin/src/features/**'
      - 'apps/web-admin/app/(admin)/game-providers/**'
      - 'apps/web-admin/app/(admin)/content-center/**'
      - 'apps/web-admin/app/(admin)/promotion-center/**'
      - 'apps/web-admin/app/(admin)/security/**'
      - 'apps/web-admin/app/(admin)/kyc-center/**'
      - 'apps/web-member/src/features/**'
      - 'apps/web-member/app/(auth)/register/**'
      - 'apps/web-member/app/deposit/**'
      - 'apps/web-member/app/withdraw/**'
      - 'apps/web-member/app/kyc/**'
      - 'apps/web-member/package.json'
      - 'tools/audit-r012-*.mjs'
      - '.github/workflows/r012-frontend-architecture.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web-admin/src/features/**'
      - 'apps/web-admin/app/(admin)/game-providers/**'
      - 'apps/web-admin/app/(admin)/content-center/**'
      - 'apps/web-admin/app/(admin)/promotion-center/**'
      - 'apps/web-admin/app/(admin)/security/**'
      - 'apps/web-admin/app/(admin)/kyc-center/**'
      - 'apps/web-member/src/features/**'
      - 'apps/web-member/app/(auth)/register/**'
      - 'apps/web-member/app/deposit/**'
      - 'apps/web-member/app/withdraw/**'
      - 'apps/web-member/app/kyc/**'
      - 'apps/web-member/package.json'
      - 'tools/audit-r012-*.mjs'
      - '.github/workflows/r012-frontend-architecture.yml'

jobs:
  feature-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@9.0.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: node tools/audit-r012-feature-boundaries.mjs
      - run: node tools/audit-r012-promotion-boundary.mjs
      - run: node tools/audit-r012-security-boundary.mjs
      - run: node tools/audit-r012-support-boundary.mjs
      - run: node tools/audit-r012-kyc-boundary.mjs
      - run: pnpm --filter @platform/web-member test
      - run: pnpm --filter @platform/web-member typecheck
      - run: pnpm --filter @platform/web-admin typecheck
