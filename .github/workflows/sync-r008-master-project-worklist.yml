name: Sync R-008 Master Project Worklist

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - tools/sync-r008-master-project-worklist.mjs
      - .github/workflows/sync-r008-master-project-worklist.yml
      - .github/r008-master-sync-*.txt

permissions:
  contents: write

concurrency:
  group: r008-master-project-worklist-sync
  cancel-in-progress: false

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update R-008 in master project worklist
        run: node tools/sync-r008-master-project-worklist.mjs
      - name: Commit synchronized worklist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/master-project-worklist.md
          if git diff --cached --quiet; then
            echo "Master project worklist already synchronized"
            exit 0
          fi
          git commit -m "docs(r008): mark master project worklist done [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
