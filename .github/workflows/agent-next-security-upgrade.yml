name: Agent Next Security Upgrade

on:
  push:
    branches:
      - agent/consolidate-duplicate-work
    paths:
      - .github/workflows/agent-next-security-upgrade.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/agent-next-security-upgrade.yml

permissions:
  contents: write

concurrency:
  group: agent-next-security-upgrade-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  upgrade:
    name: Upgrade and verify Next.js
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/consolidate-duplicate-work
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Update dependency declarations
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const rootPath = 'package.json';
          const root = JSON.parse(fs.readFileSync(rootPath, 'utf8'));
          for (const dependency of ['@next/bundle-analyzer', '@next/eslint-plugin-next', 'eslint-config-next']) {
            root.devDependencies[dependency] = '15.5.21';
          }
          fs.writeFileSync(rootPath, `${JSON.stringify(root, null, 2)}\n`);

          for (const path of ['apps/web-admin/package.json', 'apps/web-member/package.json']) {
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.dependencies.next = '15.5.21';
            fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          }

          const workspacePath = 'pnpm-workspace.yaml';
          const workspace = fs.readFileSync(workspacePath, 'utf8').replace(
            /(^\s*next:\s*)15\.5\.18(\s*$)/m,
            '$115.5.21$2',
          );
          fs.writeFileSync(workspacePath, workspace);

          const brandIconPath = 'apps/web-member/app/components/brand-icon.tsx';
          const brandIcon = fs.readFileSync(brandIconPath, 'utf8').replace(
            /\n\s*\/\/ eslint-disable-next-line @next\/next\/no-img-element/,
            '',
          );
          fs.writeFileSync(brandIconPath, brandIcon);
          NODE

      - name: Regenerate lockfile
        run: pnpm install --lockfile-only

      - name: Verify frozen install
        run: pnpm install --frozen-lockfile

      - name: Verify production dependency audit
        id: dependency-audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm audit:production-dependencies 2>&1 | tee dependency-audit.log

      - name: Upload dependency audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-security-audit-${{ github.sha }}
          path: dependency-audit.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop on dependency audit failure
        if: steps.dependency-audit.outcome != 'success'
        run: exit 1

      - name: Verify Member tests and types
        run: pnpm --filter @platform/web-member test && pnpm typecheck:member

      - name: Verify Admin and Member builds
        run: pnpm typecheck:admin && pnpm build:web-admin && pnpm build:web-member

      - name: Commit verified upgrade
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json pnpm-workspace.yaml pnpm-lock.yaml \
            apps/web-admin/package.json apps/web-member/package.json \
            apps/web-member/app/components/brand-icon.tsx
          if git diff --cached --quiet; then
            echo 'No dependency changes to commit.'
            exit 0
          fi
          git commit -m 'fix(security): upgrade Next.js to 15.5.21'
          git push origin HEAD:agent/consolidate-duplicate-work
