name: One-shot Admin Worklist Sync

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/admin-promotion-worklist-sync.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch verified Admin worklist entries
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/admin-modernization-chat-worklist.md')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('- [ ] SLA/เวลาค้าง', '- [x] SLA/เวลาค้างจาก queue-aging endpoint'),
              ('- [ ] Action drawer ต่อรายการ', '- [x] Action drawer ต่อรายการผ่าน shared drawer contract'),
              ('- [x] จำกัด API ล่าสุด 100 รายการ', '- [x] Server query รองรับ page/take/filter และ response metadata'),
              ('- [ ] Date filter', '- [x] Date filter'),
              ('- [ ] Type filter แยกเฉพาะ', '- [x] Type filter แยกเฉพาะ'),
              ('- [ ] Server-side pagination', '- [x] Server-side pagination'),
              ('- [ ] Export\n\n### `/wallet-statement`', '- [~] CSV export เฉพาะหน้าที่โหลดจาก server\n\n### `/wallet-statement`'),
              ('- [ ] Table contract', '- [x] Shared server list/filter/pagination contract'),
              ('- [x] Processed/Retry/Failed/Duplicate states', '- [x] Received/Processed/Failed/Duplicate/Ignored/Resolved states'),
              ('- [ ] Replay action จำกัดสิทธิ์', '- [ ] Replay endpoint/action พร้อม permission, confirmation และ audit trail'),
              ('- [ ] Server-side pagination\n- [x] Payload redaction ยืนยันด้วย provider fixtures และ shared boundary', '- [x] Server-side pagination\n- [x] Payload redaction ยืนยันด้วย provider fixtures และ shared boundary'),
              ('- [x] Campaign/Banner/Bonus/Coupon/Reward tabs', '- [~] Campaign editor + Member preview มีแล้ว แต่ยังไม่มี Banner/Bonus/Coupon/Reward tabs แยก'),
              ('- [ ] Unsaved changes warning\n- [~] Safe error ยังไม่ครบทุกจุด', '- [x] Unsaved changes warning + shared reload confirmation\n- [x] Safe error ผ่าน global boundary และ network fallback'),
              ('- [ ] Unsaved changes warning\n- [~] Error handling/try-finally ยังไม่ครบทุก flow', '- [x] Unsaved changes warning\n- [~] Error handling/try-finally ยังไม่ครบทุก flow'),
              ('- [ ] Export จำกัดสิทธิ์', '- [x] Export จำกัดสิทธิ์ผ่าน `admin.access.manage`'),
              ('- [ ] Unsaved changes warning กลาง\n- [ ] Save-state contract กลาง', '- [x] Unsaved changes warning กลาง\n- [x] Save-state contract กลาง'),
              ('- [ ] Authenticated browser/visual regression ด้วย non-production credentials', '- [x] Authenticated Role × Route × Viewport browser regression พร้อม evidence'),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Expected worklist text not found: {old!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-shot workflow
        run: rm .github/workflows/admin-promotion-worklist-sync.yml

      - name: Commit canonical worklist sync
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/admin-modernization-chat-worklist.md .github/workflows/admin-promotion-worklist-sync.yml
          git commit -m "docs(admin): sync verified modernization status"
          git push
