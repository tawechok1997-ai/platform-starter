name: Game API Verification

on:
  pull_request:
    paths:
      - 'apps/api/src/modules/provider-simulator/**'
      - 'apps/api/src/modules/game-platform/**'
      - 'apps/api/src/modules/wallet/**'
      - 'apps/api/package.json'
      - 'prisma/**'
      - 'apps/web-member/app/games/**'
      - 'apps/web-member/src/features/games/**'
      - 'apps/web-member/package.json'
      - 'tests/game-api-browser/**'
      - 'playwright.game-api.config.ts'
      - 'docs/game-api-worklist.md'
      - '.github/workflows/game-api-verification.yml'
      - 'tools/bootstrap-prisma-ci-baseline.mjs'
  push:
    branches: [main]
    paths:
      - 'apps/api/src/modules/provider-simulator/**'
      - 'apps/api/src/modules/game-platform/**'
      - 'apps/api/src/modules/wallet/**'
      - 'apps/api/package.json'
      - 'prisma/**'
      - 'apps/web-member/app/games/**'
      - 'apps/web-member/src/features/games/**'
      - 'apps/web-member/package.json'
      - 'tests/game-api-browser/**'
      - 'playwright.game-api.config.ts'
      - 'docs/game-api-worklist.md'
      - '.github/workflows/game-api-verification.yml'
      - 'tools/bootstrap-prisma-ci-baseline.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: platform_game_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d platform_game_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_game_ci?schema=public
      GAME_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_game_ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm db:generate
      - name: Validate migration files
        run: pnpm audit:migration-validation 2>&1 | tee migration-validation.log
      - name: Bootstrap disposable CI database baseline
        shell: bash
        run: |
          set +e
          node tools/bootstrap-prisma-ci-baseline.mjs 2>&1 | tee migration-deploy.log
          status=${PIPESTATUS[0]}
          pnpm db:migrate:status 2>&1 | tee migration-status.log
          exit "$status"
      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: game-api-migration-diagnostics
          path: |
            migration-validation.log
            migration-deploy.log
            migration-status.log
          if-no-files-found: warn
      - name: Game platform unit tests
        run: >-
          pnpm --filter @platform/api exec jest
          provider-simulator.service.spec.ts
          provider-simulator-round.service.spec.ts
          provider-simulator-security.service.spec.ts
          provider-simulator-transaction.service.spec.ts
          transaction-retry.spec.ts
          provider-adapter.registry.spec.ts
          provider-webhook.service.spec.ts
          round-engine.policy.spec.ts
          game-round-persistence.service.spec.ts
          provider-reconciliation-command.service.spec.ts
          game-platform-monitoring.service.spec.ts
          wallet-game-ledger-semantics.service.spec.ts
          --runInBand
      - name: PostgreSQL game concurrency tests
        run: pnpm --filter @platform/api test:db:game
      - name: API typecheck
        run: pnpm --filter @platform/api typecheck
      - name: API build
        run: pnpm --filter @platform/api build
      - name: Member game contract tests
        run: pnpm --filter @platform/web-member test
      - name: Member typecheck
        run: pnpm --filter @platform/web-member typecheck
      - name: Member build
        run: pnpm --filter @platform/web-member build
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Game lobby browser regression
        run: pnpm exec playwright test -c playwright.game-api.config.ts
      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: game-api-browser-report
          path: playwright-game-api-report
          if-no-files-found: ignore
