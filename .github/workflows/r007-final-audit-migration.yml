name: R-007 Final Audit Migration

on:
  push:
    paths:
      - .github/workflows/r007-final-audit-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Migrate remaining audit writers
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one match, found {count}')
              p.write_text(text.replace(old, new, 1))

          money = 'apps/api/src/modules/game-platform/game-platform-money.service.ts'
          replace_once(
              money,
              "import type { AdminActor, MemberActor } from '../../common/actors';\n",
              "import type { AdminActor, MemberActor } from '../../common/actors';\nimport { buildAdminAuditData } from '../../common/audit/admin-audit.builder';\n",
          )
          replace_once(
              money,
              "  private async audit(actor: AdminActor, action: string, module: string, targetId: string | undefined, newData: unknown) { await this.prisma.adminAuditLog.create({ data: { adminUserId: actor.id, action, module, targetId, newData: this.safeJson(newData) } }); }",
              "  private async audit(actor: AdminActor, action: string, module: string, targetId: string | undefined, newData: unknown) { await this.prisma.adminAuditLog.create({ data: buildAdminAuditData({ adminUserId: actor.id, action, module, targetId, newData }) }); }",
          )

          platform = 'apps/api/src/modules/game-platform/game-platform.service.ts'
          replace_once(
              platform,
              "import type { AdminActor, MemberActor } from '../../common/actors';\n",
              "import type { AdminActor, MemberActor } from '../../common/actors';\nimport { buildAdminAuditData } from '../../common/audit/admin-audit.builder';\n",
          )
          replace_once(
              platform,
              "  private async audit(actor: AdminActor, action: string, targetId: string, oldData: Prisma.InputJsonValue | null, newData: Prisma.InputJsonValue | null, meta: RequestMeta) { await this.prisma.adminAuditLog.create({ data: { adminUserId: actor.id, action, module: 'game-platform', targetId, oldData: oldData ?? Prisma.JsonNull, newData: newData ?? Prisma.JsonNull, ipAddress: meta.ipAddress, userAgent: meta.userAgent } }); }",
              "  private async audit(actor: AdminActor, action: string, targetId: string, oldData: Prisma.InputJsonValue | null, newData: Prisma.InputJsonValue | null, meta: RequestMeta) { await this.prisma.adminAuditLog.create({ data: buildAdminAuditData({ adminUserId: actor.id, action, module: 'game-platform', targetId, oldData, newData, ipAddress: meta.ipAddress, userAgent: meta.userAgent }) }); }",
          )

          baseline = Path('tools/audit-admin-audit-writers.mjs')
          text = baseline.read_text()
          for entry in (
              "  'apps/api/src/modules/game-platform/game-platform-money.service.ts',\n",
              "  'apps/api/src/modules/game-platform/game-platform.service.ts',\n",
          ):
              if text.count(entry) != 1:
                  raise SystemExit(f'baseline entry mismatch: {entry.strip()}')
              text = text.replace(entry, '', 1)
          baseline.write_text(text)

          Path('.github/workflows/r007-final-audit-migration.yml').unlink()
          PY

      - name: Verify migration shape
        shell: bash
        run: |
          node tools/audit-admin-audit-writers.mjs | tee /tmp/audit-writers.txt
          grep -q 'Baseline legacy writers remaining: 0' /tmp/audit-writers.txt
          grep -q 'Unexpected legacy writers: 0' /tmp/audit-writers.txt
          test "$(grep -RIl --include='*.ts' --exclude='*.spec.ts' --exclude='*.test.ts' 'adminAuditLog.create' apps/api/src | xargs grep -L 'buildAdminAuditData' | wc -l)" -eq 0

      - name: Commit final migration
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/api/src/modules/game-platform/game-platform-money.service.ts \
                  apps/api/src/modules/game-platform/game-platform.service.ts \
                  tools/audit-admin-audit-writers.mjs \
                  .github/workflows/r007-final-audit-migration.yml
          git commit -m "refactor(r007): migrate final game audit writers"
          git push
