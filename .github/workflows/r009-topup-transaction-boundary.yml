name: R-009 Top-up Transaction Boundary

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/src/modules/topups/**'
      - 'apps/api/src/common/infrastructure/prisma-row-locks.ts'
      - 'tools/audit-r009-topup-transaction-boundary.mjs'
      - '.github/workflows/r009-topup-transaction-boundary.yml'
  pull_request:
    paths:
      - 'apps/api/src/modules/topups/**'
      - 'apps/api/src/common/infrastructure/prisma-row-locks.ts'
      - 'tools/audit-r009-topup-transaction-boundary.mjs'
      - '.github/workflows/r009-topup-transaction-boundary.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Top-up transaction boundary audit
        run: node tools/audit-r009-topup-transaction-boundary.mjs
      - name: Repository type boundary
        run: pnpm audit:r9-repository-boundaries:strict
      - name: API typecheck
        run: pnpm typecheck:api
