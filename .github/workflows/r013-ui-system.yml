name: R-013 UI System

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-admin/**'
      - 'apps/web-member/**'
      - 'packages/design-tokens/**'
      - 'tools/audit-r013-*.mjs'
      - 'docs/r013-progress.md'
      - '.github/workflows/r013-ui-system.yml'
  pull_request:
    paths:
      - 'apps/web-admin/**'
      - 'apps/web-member/**'
      - 'packages/design-tokens/**'
      - 'tools/audit-r013-*.mjs'
      - 'docs/r013-progress.md'
      - '.github/workflows/r013-ui-system.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Design-token inventory
        run: node tools/audit-r013-design-token-inventory.mjs
      - name: Shared color token contract
        run: node tools/audit-r013-color-token-contract.mjs
      - name: Shared spacing radius and shadow contract
        run: node tools/audit-r013-shape-space-shadow-contract.mjs
      - name: Shared typography motion breakpoint and z-index contract
        run: node tools/audit-r013-type-motion-layout-contract.mjs
      - name: Shared Button Input Select and TextArea primitives
        run: node tools/audit-r013-form-control-primitives.mjs
      - name: Shared Modal Drawer and ConfirmDialog primitives
        run: node tools/audit-r013-overlay-primitives.mjs
      - name: Shared Table Pagination Tabs and Badge primitives
        run: node tools/audit-r013-data-display-primitives.mjs
      - name: Shared Toast Alert Skeleton EmptyState and ErrorState primitives
        run: node tools/audit-r013-feedback-primitives.mjs
      - name: Shared responsive strategy and transformations
        run: node tools/audit-r013-responsive-contract.mjs
      - name: Accessibility motion and contrast baseline
        run: node tools/audit-r013-accessibility-baseline.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: r013-design-token-inventory
          path: docs/evidence/r013-design-token-inventory.json
          if-no-files-found: error
      - name: Admin typecheck
        run: |
          mkdir -p artifacts
          set -o pipefail
          pnpm typecheck:admin 2>&1 | tee artifacts/r013-admin-typecheck.log
      - name: Member typecheck
        run: |
          mkdir -p artifacts
          set -o pipefail
          pnpm typecheck:member 2>&1 | tee artifacts/r013-member-typecheck.log
      - name: Upload frontend typecheck logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r013-frontend-typecheck-logs
          path: artifacts/r013-*-typecheck.log
          if-no-files-found: warn
