name: Fix dashboard risk order

on:
  push:
    branches: [main]
    paths:
      - '.github/dashboard-risk-order-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Move risk before finance
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web-admin/app/(admin)/dashboard/page.tsx')
          text = path.read_text()
          risk = '''        {canViewRisk && !riskError && <AdminCard title={t.riskPressure} description={`${riskSummary.openCount} ${t.open} · ${riskMetrics.loadedTotal} ${t.loaded}`} action={<AdminLinkButton href="/risk-alerts">{t.openRiskCenter}</AdminLinkButton>}>
          <RiskSeverityChart metrics={riskMetrics} locale={locale} copy={t} />
        </AdminCard>}

'''
          if text.count(risk) != 1:
              raise SystemExit('risk block not found exactly once')
          text = text.replace(risk, '')
          marker = '''        {summary?.today && canViewFinance && <AdminCard title={t.financeFlow} description={summary.today.date} action={canViewReports ? <AdminLinkButton href="/reports">{t.fullReport}</AdminLinkButton> : undefined}>
'''
          if text.count(marker) != 1:
              raise SystemExit('finance marker not found exactly once')
          text = text.replace(marker, risk + marker)
          path.write_text(text)
          PY
      - run: pnpm --filter @platform/web-admin typecheck
      - name: Commit patch and cleanup
        run: |
          rm -f .github/workflows/fix-dashboard-risk-order.yml .github/dashboard-risk-order-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web-admin/app/'(admin)'/dashboard/page.tsx .github/workflows/fix-dashboard-risk-order.yml .github/dashboard-risk-order-trigger
          git commit -m "refactor(admin): move dashboard risk before finance"
          git push origin main
