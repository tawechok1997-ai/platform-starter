name: Smoke API

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      api_url:
        description: API base URL
        required: true
        default: https://api-service.up.railway.app
      run_env_verification:
        description: Run production env verification with repository secrets
        required: true
        type: boolean
        default: false
      run_admin_checks:
        description: Run admin-token checks when secret is available
        required: true
        type: boolean
        default: true
      run_member_checks:
        description: Run member-token checks when secret is available
        required: true
        type: boolean
        default: true

jobs:
  smoke-api:
    runs-on: ubuntu-latest
    env:
      RESOLVED_API_URL: ${{ inputs.api_url || secrets.PROD_API_URL || 'https://api-service.up.railway.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/smoke-api.sh scripts/verify-production-env.sh

      - name: Run production env verification
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_env_verification }}
        env:
          API_URL: ${{ env.RESOLVED_API_URL }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          JWT_ACCESS_KEY: ${{ secrets.PROD_JWT_ACCESS_KEY }}
          ADMIN_JWT_ACCESS_TTL: ${{ secrets.PROD_ADMIN_JWT_ACCESS_TTL }}
          ADMIN_REFRESH_TTL_HOURS: ${{ secrets.PROD_ADMIN_REFRESH_TTL_HOURS }}
          MEMBER_WEB_URL: ${{ secrets.PROD_MEMBER_WEB_URL }}
          ADMIN_WEB_URL: ${{ secrets.PROD_ADMIN_WEB_URL }}
          PRIVATE_MEDIA_DIR: ${{ secrets.PROD_PRIVATE_MEDIA_DIR }}
          REDIS_URL: ${{ secrets.PROD_REDIS_URL }}
          STORAGE_DRIVER: ${{ secrets.PROD_STORAGE_DRIVER }}
          S3_ENDPOINT: ${{ secrets.PROD_S3_ENDPOINT }}
          S3_REGION: ${{ secrets.PROD_S3_REGION }}
          S3_BUCKET: ${{ secrets.PROD_S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.PROD_S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.PROD_S3_SECRET_ACCESS_KEY }}
          S3_FORCE_PATH_STYLE: ${{ secrets.PROD_S3_FORCE_PATH_STYLE }}
        run: ./scripts/verify-production-env.sh

      - name: Run anonymous smoke checks
        env:
          API_URL: ${{ env.RESOLVED_API_URL }}
        run: ./scripts/smoke-api.sh

      - name: Run admin smoke checks
        if: ${{ github.event_name == 'schedule' || inputs.run_admin_checks }}
        env:
          API_URL: ${{ env.RESOLVED_API_URL }}
          ADMIN_TOKEN: ${{ secrets.PROD_ADMIN_TOKEN }}
        run: |
          if [[ -z "$ADMIN_TOKEN" ]]; then echo "PROD_ADMIN_TOKEN is required for admin smoke checks."; exit 1; fi
          ./scripts/smoke-api.sh

      - name: Run member smoke checks
        if: ${{ github.event_name == 'schedule' || inputs.run_member_checks }}
        env:
          API_URL: ${{ env.RESOLVED_API_URL }}
          MEMBER_TOKEN: ${{ secrets.PROD_MEMBER_TOKEN }}
        run: |
          if [[ -z "$MEMBER_TOKEN" ]]; then echo "PROD_MEMBER_TOKEN is required for member smoke checks."; exit 1; fi
          ./scripts/smoke-api.sh
