name: R012 Inventory Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/r012-inventory-once.yml'

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Inventory target pages
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '# R-012 target page inventory'
            echo
            find apps/web-admin apps/web-member -type f \( -iname '*register*' -o -iname '*withdraw*' \) | sort
          } > docs/r012-target-page-inventory.md
          rm .github/workflows/r012-inventory-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/r012-target-page-inventory.md .github/workflows/r012-inventory-once.yml
          git commit -m 'docs(r012): inventory register and withdrawal pages'
          git push
