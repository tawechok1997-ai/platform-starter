name: R011 Security Boundaries

on:
  pull_request:
    paths:
      - 'apps/api/src/main.ts'
      - 'apps/api/src/common/errors/**'
      - 'apps/api/src/common/filters/**'
      - 'apps/api/src/common/security/**'
      - 'apps/api/src/common/validation/**'
      - 'prisma/schema.prisma'
      - 'docs/master-project-worklist.md'
      - 'tools/audit-r011-*.mjs'
      - '.github/workflows/r011-security-boundaries.yml'
  push:
    branches: [main]
    paths:
      - 'apps/api/src/main.ts'
      - 'apps/api/src/common/errors/**'
      - 'apps/api/src/common/filters/**'
      - 'apps/api/src/common/security/**'
      - 'apps/api/src/common/validation/**'
      - 'prisma/schema.prisma'
      - 'docs/master-project-worklist.md'
      - 'tools/audit-r011-*.mjs'
      - '.github/workflows/r011-security-boundaries.yml'

jobs:
  security-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node tools/audit-r011-error-boundaries.mjs
      - run: node tools/audit-r011-authorization-policies.mjs
      - run: node tools/audit-r011-domain-authorization.mjs
      - run: node tools/audit-r011-security-policy-foundations.mjs
      - run: node tools/audit-r011-sensitive-logging.mjs
      - run: node tools/audit-r011-request-safety-boundaries.mjs
      - run: pnpm --filter @platform/api exec jest --runInBand domain-error-http.mapper.spec.ts authorization-policy.spec.ts domain-authorization-policy.spec.ts step-up-policy.spec.ts reason-audit-policy.spec.ts input-normalization.spec.ts sensitive-log-redactor.spec.ts validation-boundary.spec.ts
      - run: pnpm --filter @platform/api typecheck
