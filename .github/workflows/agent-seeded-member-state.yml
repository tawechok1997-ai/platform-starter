name: Agent Seeded Member State

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/agent-seeded-member-state.yml

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      API_URL: ${{ secrets.P6_API_URL || secrets.SEED_API_URL || 'https://platformapi-production-3c91.up.railway.app' }}
      ADMIN_USERNAME: ${{ secrets.SEED_ADMIN_USERNAME || secrets.P6_ADMIN_USERNAME || secrets.SEED_ADMIN_EMAIL || secrets.P6_ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD || secrets.P6_ADMIN_PASSWORD }}
      MEMBER_IDENTIFIER: ${{ secrets.SEED_MEMBER_EMAIL || secrets.P6_MEMBER_EMAIL || secrets.SEED_MEMBER_USERNAME || secrets.P6_MEMBER_USERNAME }}
    steps:
      - name: Inspect seeded Member through read-only Admin API
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p seeded-member-state
          node <<'NODE'
          const fs = require('node:fs');

          const apiUrl = String(process.env.API_URL || '').replace(/\/$/, '');
          const username = String(process.env.ADMIN_USERNAME || '').trim();
          const password = String(process.env.ADMIN_PASSWORD || '').trim();
          const memberIdentifier = String(process.env.MEMBER_IDENTIFIER || '').trim();

          const result = {
            apiConfigured: Boolean(apiUrl),
            adminIdentityConfigured: Boolean(username),
            adminPasswordConfigured: Boolean(password),
            memberIdentifierConfigured: Boolean(memberIdentifier),
            adminLoginStatus: null,
            adminRequiresTwoFactor: false,
            adminAuthenticated: false,
            memberLookupStatus: null,
            memberFound: null,
            memberStatus: null,
            errorCode: null,
          };

          async function run() {
            if (!apiUrl || !username || !password || !memberIdentifier) {
              result.errorCode = 'MISSING_ENVIRONMENT';
              return;
            }

            const login = await fetch(`${apiUrl}/admin/auth/login`, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ username, secret: password, deviceId: 'github-seeded-member-inspection' }),
            });
            result.adminLoginStatus = login.status;
            const loginBody = await login.json().catch(() => ({}));
            result.adminRequiresTwoFactor = loginBody?.requiresTwoFactor === true;
            const accessToken = typeof loginBody?.accessToken === 'string' ? loginBody.accessToken : '';
            result.adminAuthenticated = login.ok && Boolean(accessToken);
            if (!result.adminAuthenticated) {
              result.errorCode = result.adminRequiresTwoFactor ? 'ADMIN_TWO_FACTOR_REQUIRED' : 'ADMIN_LOGIN_FAILED';
              return;
            }

            const lookup = await fetch(`${apiUrl}/admin/members?query=${encodeURIComponent(memberIdentifier)}&page=1&take=5`, {
              headers: { authorization: `Bearer ${accessToken}` },
            });
            result.memberLookupStatus = lookup.status;
            const body = await lookup.json().catch(() => ({}));
            if (!lookup.ok) {
              result.errorCode = 'MEMBER_LOOKUP_FAILED';
              return;
            }
            const items = Array.isArray(body?.items) ? body.items : Array.isArray(body) ? body : [];
            const normalized = memberIdentifier.toLowerCase();
            const exact = items.find((item) =>
              [item?.username, item?.email, item?.phone]
                .filter((value) => typeof value === 'string')
                .some((value) => value.toLowerCase() === normalized),
            );
            result.memberFound = Boolean(exact);
            result.memberStatus = typeof exact?.status === 'string' ? exact.status : null;
          }

          run()
            .catch(() => { result.errorCode = 'UNEXPECTED_INSPECTION_ERROR'; })
            .finally(() => {
              fs.writeFileSync('seeded-member-state/result.json', `${JSON.stringify(result, null, 2)}\n`);
            });
          NODE

      - name: Upload sanitized state
        uses: actions/upload-artifact@v4
        with:
          name: seeded-member-state-${{ github.sha }}
          path: seeded-member-state/result.json
          if-no-files-found: error
          retention-days: 1
