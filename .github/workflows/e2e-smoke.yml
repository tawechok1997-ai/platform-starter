name: E2E Smoke

on:
  workflow_dispatch:
    inputs:
      admin_web_url:
        description: Admin web URL
        required: true
        default: https://admin-service.up.railway.app
      member_web_url:
        description: Member web URL
        required: true
        default: https://member-service.up.railway.app

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run Playwright smoke tests
        env:
          ADMIN_WEB_URL: ${{ inputs.admin_web_url }}
          MEMBER_WEB_URL: ${{ inputs.member_web_url }}
        run: pnpm test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
