name: One-shot CMS Raw Dirty Guard

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/content-center-raw-dirty-sync.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Track unapplied Raw JSON in unsaved-changes guard
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/web-admin/src/features/cms/content-center-page.tsx')
          text = path.read_text(encoding='utf-8')
          old = "  const { isDirty, saveState } = useAdminUnsavedChanges({ value: content, savedValue: savedContent, saving: saving || uploading });"
          new = "  const { isDirty, saveState } = useAdminUnsavedChanges({\n    value: { content, pendingRawJson: rawDirty ? rawJson : '' },\n    savedValue: { content: savedContent, pendingRawJson: '' },\n    saving: saving || uploading,\n  });"
          if old not in text:
              raise SystemExit('Expected Content Center unsaved-changes line not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Remove one-shot workflow
        run: rm .github/workflows/content-center-raw-dirty-sync.yml

      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web-admin/src/features/cms/content-center-page.tsx .github/workflows/content-center-raw-dirty-sync.yml
          git commit -m "fix(admin): guard unapplied CMS JSON edits"
          git push
