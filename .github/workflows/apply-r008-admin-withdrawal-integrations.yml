name: Apply R-008 Admin and Withdrawal Integrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - tools/apply-r008-admin-withdrawal-integrations.mjs
      - tools/audit-r008-closure.mjs
      - .github/workflows/apply-r008-admin-withdrawal-integrations.yml

permissions:
  contents: write

concurrency:
  group: r008-admin-withdrawal-integrations
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: node tools/apply-r008-admin-withdrawal-integrations.mjs
      - run: pnpm audit:r8-closure
      - run: pnpm typecheck:api
      - run: pnpm --filter @platform/api test -- r008-domain-policies.spec.ts --runInBand
      - run: pnpm build:api
      - name: Commit verified integrations
        run: |
          if git diff --quiet; then
            echo "No integration changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/modules/admin-access/admin-access.service.ts apps/api/src/modules/withdrawals/withdrawals.service.ts
          git commit -m "refactor(r008): enforce admin and withdrawal domain policies [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
