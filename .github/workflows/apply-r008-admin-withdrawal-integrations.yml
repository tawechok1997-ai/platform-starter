name: Verify and Close R-008 Domain Policies

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - tools/audit-r008-closure.mjs
      - tools/close-r008-after-verification.mjs
      - apps/api/src/common/domain/**
      - apps/api/src/modules/admin-access/**
      - apps/api/src/modules/withdrawals/**
      - apps/api/src/modules/wallet/domain/**
      - .github/r008-*.txt
      - .github/workflows/apply-r008-admin-withdrawal-integrations.yml

permissions:
  contents: write

concurrency:
  group: r008-final-closure
  cancel-in-progress: false

jobs:
  verify-and-close:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --prefer-offline
      - name: Verify R-008 integration markers
        run: pnpm audit:r8-closure
      - name: Typecheck API
        run: pnpm typecheck:api
      - name: Run full API regression
        run: pnpm --filter @platform/api test -- --runInBand
      - name: Build API
        run: pnpm build:api
      - name: Update verified closure documents
        env:
          R008_VERIFIED_COMMIT: ${{ github.sha }}
        run: node tools/close-r008-after-verification.mjs
      - name: Commit R-008 closure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/r008-closure-checklist.md docs/master-worklist.md
          if git diff --cached --quiet; then
            echo "R-008 closure documents already up to date"
            exit 0
          fi
          git commit -m "docs(r008): mark domain policy separation done [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
