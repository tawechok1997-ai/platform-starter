name: R-006 Quality Baseline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_ci?schema=public
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Detect changed scopes
        id: scope
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: pnpm ci:changed-scope
      - name: Prisma schema and generated-client drift
        run: |
          pnpm exec prisma validate --schema prisma/schema.prisma
          pnpm audit:generated-drift
      - name: Migration validation
        run: pnpm audit:migration-validation
      - name: Architecture and test-safety guards
        run: |
          pnpm audit:architecture-inventory
          pnpm audit:architecture-boundaries
          pnpm audit:circular-dependencies
          pnpm audit:critical-test-safety
          pnpm audit:browser-quality
          pnpm audit:r1-closure
          pnpm audit:r2-closure
          pnpm audit:r3-closure
      - name: R-009 controller persistence inventory
        run: |
          pnpm audit:r9-controller-prisma
          pnpm audit:r9-controller-prisma:json > r009-controller-prisma-inventory.json
      - name: Upload R-009 controller inventory
        uses: actions/upload-artifact@v4
        with:
          name: r009-controller-prisma-inventory-${{ github.run_id }}
          path: r009-controller-prisma-inventory.json
          if-no-files-found: error
          retention-days: 30
      - name: Lint API
        if: steps.scope.outputs.api == 'true'
        run: pnpm lint:api
      - name: Lint Admin
        if: steps.scope.outputs.admin == 'true'
        run: pnpm lint:admin
      - name: Lint Member
        if: steps.scope.outputs.member == 'true'
        run: pnpm lint:member
      - name: Lint packages
        if: steps.scope.outputs.packages == 'true'
        run: pnpm lint:packages
      - name: Typecheck API
        if: steps.scope.outputs.api == 'true'
        run: pnpm typecheck:api
      - name: Typecheck Admin
        if: steps.scope.outputs.admin == 'true'
        run: pnpm typecheck:admin
      - name: Typecheck Member
        if: steps.scope.outputs.member == 'true'
        run: pnpm typecheck:member
      - name: Typecheck packages
        if: steps.scope.outputs.packages == 'true'
        run: pnpm typecheck:packages
      - name: Package export audit
        run: pnpm audit:unused-exports
      - name: R-006 closure structure audit
        run: pnpm audit:r6-closure
      - name: Quality summary
        if: always()
        run: |
          {
            echo '## R-001–R-006 Quality Baseline'
            echo "- API scope: ${{ steps.scope.outputs.api || 'unknown' }}"
            echo "- Admin scope: ${{ steps.scope.outputs.admin || 'unknown' }}"
            echo "- Member scope: ${{ steps.scope.outputs.member || 'unknown' }}"
            echo "- Packages scope: ${{ steps.scope.outputs.packages || 'unknown' }}"
            echo '- R-001 architecture inventory, R-002 boundaries, R-003 regression safety and R-006 quality closure gates execute unconditionally'
            echo '- R-009 controller persistence inventory is published as a workflow artifact; strict enforcement remains disabled until the baseline is reviewed'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload quality failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: r006-quality-failure-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            playwright-report/
            test-results/
            coverage/
            npm-debug.log
            pnpm-debug.log
