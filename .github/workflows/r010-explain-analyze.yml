name: R-010 EXPLAIN ANALYZE

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/src/modules/reports/**'
      - 'prisma/**'
      - 'package.json'
      - 'tools/r010-explain-analyze.mjs'
      - 'tools/audit-r010-explain-analyze-evidence.mjs'
      - '.github/workflows/r010-explain-analyze.yml'
  pull_request:
    paths:
      - 'apps/api/src/modules/reports/**'
      - 'prisma/**'
      - 'package.json'
      - 'tools/r010-explain-analyze.mjs'
      - 'tools/audit-r010-explain-analyze-evidence.mjs'
      - '.github/workflows/r010-explain-analyze.yml'

permissions:
  contents: write

jobs:
  explain-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: platform_r010
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d platform_r010"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform_r010?schema=public
      R010_EXPLAIN_OUTPUT: artifacts/r010-explain-analyze.json
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Apply database migrations
        run: pnpm db:migrate
      - name: Generate Prisma client
        run: pnpm db:generate
      - name: Capture EXPLAIN ANALYZE evidence
        run: pnpm audit:r10:explain
      - name: Validate evidence payload
        run: pnpm audit:r10:explain:validate -- artifacts/r010-explain-analyze.json
      - uses: actions/upload-artifact@v4
        with:
          name: r010-explain-analyze
          path: artifacts/r010-explain-analyze.json
          if-no-files-found: error
      - name: Persist validated evidence on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p docs/evidence/generated
          cp artifacts/r010-explain-analyze.json docs/evidence/generated/r010-explain-analyze.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/evidence/generated/r010-explain-analyze.json
          if git diff --cached --quiet; then
            echo "Validated evidence is unchanged."
          else
            git commit -m "chore: persist R-010 EXPLAIN evidence"
            git push
          fi
