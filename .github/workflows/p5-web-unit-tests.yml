name: P5 Web Unit Tests

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-member/**'
      - 'packages/api-client/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/p5-web-unit-tests.yml'
  pull_request:
    paths:
      - 'apps/web-member/**'
      - 'packages/api-client/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/p5-web-unit-tests.yml'

permissions:
  contents: read

concurrency:
  group: p5-web-unit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  critical-web-tests:
    name: API client and Member tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test shared API client
        run: pnpm --filter @platform/api-client test

      - name: Test Member critical components
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/p5-web-unit
          pnpm --filter @platform/web-member test 2>&1 | tee artifacts/p5-web-unit/member-test.log

      - name: Upload P5 web unit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p5-web-unit-evidence-${{ github.sha }}
          path: artifacts/p5-web-unit
          if-no-files-found: warn
          retention-days: 30
