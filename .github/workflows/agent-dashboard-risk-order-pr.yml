name: Agent Dashboard Risk Order PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web-admin/app/(admin)/dashboard/page.tsx'
      - '.github/agent-dashboard-risk-order-pr.trigger'
      - '.github/workflows/agent-dashboard-risk-order-pr.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Move risk before finance
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('apps/web-admin/app/(admin)/dashboard/page.tsx')
          s = p.read_text()
          risk = '''        {canViewRisk && !riskError && <AdminCard title={t.riskPressure} description={`${riskSummary.openCount} ${t.open} · ${riskMetrics.loadedTotal} ${t.loaded}`} action={<AdminLinkButton href="/risk-alerts">{t.openRiskCenter}</AdminLinkButton>}>
          <RiskSeverityChart metrics={riskMetrics} locale={locale} copy={t} />
        </AdminCard>}\n\n'''
          if risk not in s:
              raise SystemExit('risk block not found')
          s = s.replace(risk, '', 1)
          marker = '        {summary?.today && canViewFinance && <AdminCard title={t.financeFlow}'
          if marker not in s:
              raise SystemExit('finance marker not found')
          s = s.replace(marker, risk + marker, 1)
          p.write_text(s)
          PY
      - name: Typecheck admin
        run: pnpm --filter @platform/web-admin typecheck
      - name: Commit patch and cleanup
        run: |
          rm -f .github/workflows/agent-dashboard-risk-order-pr.yml .github/agent-dashboard-risk-order-pr.trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web-admin/app/'(admin)'/dashboard/page.tsx .github/workflows/agent-dashboard-risk-order-pr.yml .github/agent-dashboard-risk-order-pr.trigger
          git commit -m "refactor(admin): move risk before finance on dashboard"
          git push
