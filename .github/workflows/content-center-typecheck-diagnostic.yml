name: One-shot Content Center Typecheck Diagnostic

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/content-center-typecheck-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --silent
      - name: Capture typecheck output
        shell: bash
        run: |
          mkdir -p docs/verification
          set +e
          pnpm --filter @platform/web-admin typecheck > docs/verification/content-center-typecheck.log 2>&1
          status=$?
          set -e
          rm .github/workflows/content-center-typecheck-diagnostic.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/verification/content-center-typecheck.log .github/workflows/content-center-typecheck-diagnostic.yml
          git commit -m "test(ci): capture Content Center typecheck output"
          git push
          exit $status
