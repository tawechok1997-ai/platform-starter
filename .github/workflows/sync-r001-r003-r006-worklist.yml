name: Sync R-001 R-003 R-006 Worklist

on:
  push:
    branches: [main]
    paths:
      - tools/sync-r001-r003-r006-worklist.mjs
      - docs/architecture/r001-closure.md
      - docs/architecture/r002-closure.md
      - docs/architecture/r003-closure.md
      - docs/architecture/r006-closure.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sync closed work items
        run: node tools/sync-r001-r003-r006-worklist.mjs
      - name: Commit worklist status
        run: |
          if git diff --quiet -- docs/master-project-worklist.md; then
            echo 'Master worklist already synchronized.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/master-project-worklist.md
          git commit -m 'docs(worklist): close R-001 R-002 R-003 and R-006 [skip ci]'
          git push
