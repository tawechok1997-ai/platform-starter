name: R012 Support Boundary

on:
  pull_request:
    paths:
      - 'apps/web-member/app/support/**'
      - 'apps/web-member/src/features/support/**'
      - 'tools/audit-r012-support-boundary.mjs'
      - '.github/workflows/r012-support-boundary.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web-member/app/support/**'
      - 'apps/web-member/src/features/support/**'
      - 'tools/audit-r012-support-boundary.mjs'
      - '.github/workflows/r012-support-boundary.yml'

jobs:
  verify-support-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@11.13.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: node tools/audit-r012-support-boundary.mjs
      - run: pnpm --filter @platform/web-member typecheck
