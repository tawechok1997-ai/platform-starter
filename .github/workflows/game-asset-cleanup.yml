name: Game Asset Cleanup

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'asset/pc/**'
      - 'asset/catalog/pc/**'
      - 'asset/catalog/mobile/**'
      - 'apps/api/src/modules/provider-simulator/provider-simulator-catalog.ts'
      - 'tools/cleanup-game-assets.mjs'
      - 'tools/organize-game-assets.mjs'
      - 'tools/build-game-asset-inventory.mjs'
      - 'tools/migrate-pc-assets.mjs'
      - '.github/workflows/game-asset-cleanup.yml'

permissions:
  contents: write

concurrency:
  group: game-asset-cleanup-main
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Normalize mobile catalog when present
        run: |
          if [ -d asset/catalog/mobile ]; then
            node tools/cleanup-game-assets.mjs
            node tools/organize-game-assets.mjs
            node tools/build-game-asset-inventory.mjs
            node tools/cleanup-game-assets.mjs --dry-run
          fi
      - name: Migrate complete PC asset library
        run: |
          if [ -f asset/pc/manifest.json ]; then
            node tools/migrate-pc-assets.mjs
          else
            echo 'No raw PC manifest requires migration.'
          fi
      - name: Verify migrations are complete
        run: |
          test ! -e asset/mobil
          test ! -e asset/pc
          test -f asset/catalog/mobile/manifest.json
          test -f asset/catalog/pc/manifest.json
          node -e "const m=require('./asset/catalog/mobile/manifest.json'); if(!Array.isArray(m.items)||m.items.length===0) process.exit(1); console.log('Mobile canonical assets:',m.items.length)"
          node -e "const m=require('./asset/catalog/pc/manifest.json'); if(!Array.isArray(m.items)||m.items.length===0) process.exit(1); console.log('PC canonical assets:',m.items.length)"
          if grep -q "asset/mobil/\|asset/pc/" apps/api/src/modules/provider-simulator/provider-simulator-catalog.ts; then
            echo 'Provider catalog still references a raw asset path.'
            exit 1
          fi
      - name: Commit organized asset libraries
        run: |
          if git diff --quiet; then
            echo 'No asset migration changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A asset docs/generated apps/api/src/modules/provider-simulator/provider-simulator-catalog.ts
          git commit -m 'chore(game-assets): migrate pc assets into canonical library'
          git push
