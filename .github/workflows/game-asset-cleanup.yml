name: Game Asset Cleanup

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'asset/mobil/**'
      - 'asset/catalog/mobile/**'
      - 'apps/api/src/modules/provider-simulator/provider-simulator-catalog.ts'
      - 'tools/cleanup-game-assets.mjs'
      - 'tools/organize-game-assets.mjs'
      - 'tools/build-game-asset-inventory.mjs'
      - '.github/workflows/game-asset-cleanup.yml'

permissions:
  contents: write

concurrency:
  group: game-asset-cleanup-main
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Remove exact duplicates and junk from uploaded assets
        run: node tools/cleanup-game-assets.mjs
      - name: Move every remaining mobile asset into canonical categories
        run: node tools/organize-game-assets.mjs
      - name: Rebuild canonical inventory and rename reports
        run: node tools/build-game-asset-inventory.mjs
      - name: Verify canonical catalog has no exact duplicates
        run: node tools/cleanup-game-assets.mjs --dry-run
      - name: Verify migration is complete
        run: |
          test ! -e asset/mobil
          test -f asset/catalog/mobile/catalog.json
          test -f asset/catalog/mobile/manifest.json
          if grep -q "asset/mobil/" apps/api/src/modules/provider-simulator/provider-simulator-catalog.ts; then
            echo 'Provider catalog still references asset/mobil.'
            exit 1
          fi
          node -e "const m=require('./asset/catalog/mobile/manifest.json'); if(!Array.isArray(m.items)||m.items.length===0) process.exit(1); console.log('Canonical assets:',m.items.length)"
      - name: Commit fully organized asset library
        run: |
          if git diff --quiet; then
            echo 'No asset migration changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A asset docs/generated apps/api/src/modules/provider-simulator/provider-simulator-catalog.ts
          git commit -m 'chore(game-assets): migrate all mobile assets into canonical library'
          git push
