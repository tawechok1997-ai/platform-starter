name: Repository Maintenance Audit

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/api/src/**'
      - 'tools/audit-backend-decomposition.mjs'
      - 'tools/audit-backend-decomposition-baseline.mjs'
      - 'tools/audit-repository-cleanup-inventory.mjs'
      - 'tools/audit-repository-cleanup-baseline.mjs'
      - 'docs/architecture/backend-decomposition-baseline.json'
      - 'docs/maintenance/repository-cleanup-baseline.json'
      - '.github/workflows/repository-maintenance-audit.yml'

permissions:
  contents: read
  issues: write

jobs:
  capture-maintenance-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate committed baselines
        run: |
          node tools/audit-backend-decomposition-baseline.mjs
          node tools/audit-repository-cleanup-baseline.mjs

      - name: Capture backend decomposition inventory
        run: |
          mkdir -p artifacts/repository-maintenance
          R007_JSON=1 node tools/audit-backend-decomposition.mjs \
            > artifacts/repository-maintenance/backend-decomposition.json

      - name: Capture repository cleanup inventory
        run: |
          node tools/audit-repository-cleanup-inventory.mjs --json \
            > artifacts/repository-maintenance/repository-cleanup.json

      - name: Record workflow context
        run: |
          cat > artifacts/repository-maintenance/context.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "commit": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "runId": "${GITHUB_RUN_ID}",
            "runAttempt": "${GITHUB_RUN_ATTEMPT}"
          }
          EOF

      - name: Build issue summary
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const backend = JSON.parse(fs.readFileSync('artifacts/repository-maintenance/backend-decomposition.json', 'utf8'));
          const cleanup = JSON.parse(fs.readFileSync('artifacts/repository-maintenance/repository-cleanup.json', 'utf8'));
          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const lines = [
            `## Repository maintenance audit`,
            ``,
            `- Commit: \`${process.env.GITHUB_SHA}\``,
            `- Workflow run: ${runUrl}`,
            `- Backend files scanned: **${backend.scannedFiles}**`,
            `- Backend decomposition candidates: **${backend.candidateCount}**`,
            `- Critical / high / moderate: **${backend.severityCounts.critical} / ${backend.severityCounts.high} / ${backend.severityCounts.moderate}**`,
            `- Repository files scanned: **${cleanup.scannedFiles}**`,
            `- Cleanup review candidates: **${cleanup.candidateCount}**`,
            ``,
            `Download the \`repository-maintenance-${process.env.GITHUB_SHA}\` artifact from the workflow run before approving either baseline.`,
          ];
          fs.writeFileSync('artifacts/repository-maintenance/issue-summary.md', `${lines.join('\n')}\n`);
          NODE

      - name: Upload maintenance evidence
        uses: actions/upload-artifact@v4
        with:
          name: repository-maintenance-${{ github.sha }}
          path: artifacts/repository-maintenance
          if-no-files-found: error
          retention-days: 30

      - name: Publish deduplicated audit issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: '[MAINTENANCE AUDIT] Repository baselines require review'
        run: |
          issue_number="$(gh issue list --state open --search "${ISSUE_TITLE} in:title" --json number,title --jq '.[] | select(.title == env.ISSUE_TITLE) | .number' | head -n 1)"
          if [ -n "${issue_number}" ]; then
            gh issue comment "${issue_number}" --body-file artifacts/repository-maintenance/issue-summary.md
          else
            gh issue create --title "${ISSUE_TITLE}" --body-file artifacts/repository-maintenance/issue-summary.md
          fi

      - name: Publish failure summary
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: '[MAINTENANCE AUDIT] Workflow failed'
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body="Maintenance audit failed for commit ${GITHUB_SHA}. Inspect: ${run_url}"
          issue_number="$(gh issue list --state open --search "${ISSUE_TITLE} in:title" --json number,title --jq '.[] | select(.title == env.ISSUE_TITLE) | .number' | head -n 1)"
          if [ -n "${issue_number}" ]; then
            gh issue comment "${issue_number}" --body "${body}"
          else
            gh issue create --title "${ISSUE_TITLE}" --body "${body}"
          fi