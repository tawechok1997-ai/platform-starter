name: One-shot Admin Overview Priority Sync

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/admin-overview-priority-sync.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync verified dashboard and operations scope
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/admin-modernization-chat-worklist.md')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '- [ ] เรียง System status → Urgent queue → KPI → Risk → Finance → Activity': '- [x] เรียง System status → Urgent queue → KPI → Risk → Finance → Activity',
              '- [ ] งานเร่งด่วนก่อน': '- [x] งานเร่งด่วนก่อนด้วย explicit priority score และ primary action',
              '- [ ] Priority filter': '- [x] Priority filter แยก Critical และ Member queues',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected worklist item not found: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Remove one-shot workflow
        run: rm .github/workflows/admin-overview-priority-sync.yml
      - name: Commit verified worklist sync
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/admin-modernization-chat-worklist.md .github/workflows/admin-overview-priority-sync.yml
          git commit -m "docs(admin): close dashboard and operations priority scope"
          git push
