name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        target:
          - api
          - web-member
          - web-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit admin permission coverage
        run: pnpm audit:admin-permissions

      - name: Audit finance workflow safety
        run: pnpm audit:finance-workflows

      - name: Audit admin token storage
        run: pnpm audit:admin-token-storage

      - name: Audit Admin UI XSS boundaries
        run: pnpm audit:admin-xss

      - name: Build API
        if: matrix.target == 'api'
        run: pnpm build:api

      - name: Test API
        if: matrix.target == 'api'
        run: pnpm --filter @platform/api test -- --runInBand

      - name: Build member web
        if: matrix.target == 'web-member'
        run: pnpm build:web-member

      - name: Build admin web
        if: matrix.target == 'web-admin'
        run: pnpm build:web-admin
