name: R012 Withdrawal Inventory Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/r012-withdraw-inventory-once.yml'

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Locate withdrawal component
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '# R-012 withdrawal component inventory'
            echo
            echo '## CSS imports'
            grep -RIl --exclude='member-withdraw-flow.css' 'member-withdraw-flow.css' apps/web-member || true
            echo
            echo '## Class usage'
            grep -RIl --exclude='member-withdraw-flow.css' 'withdraw-wallet-summary\|withdraw-history-item\|withdraw-success-message' apps/web-member || true
          } > docs/r012-withdraw-component-inventory.md
          rm .github/workflows/r012-withdraw-inventory-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/r012-withdraw-component-inventory.md .github/workflows/r012-withdraw-inventory-once.yml
          git commit -m 'docs(r012): locate withdrawal component'
          git push
