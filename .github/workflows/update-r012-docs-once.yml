name: Update R012 Documentation Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-r012-docs-once.yml'

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update master worklist after R-012 closure
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/master-project-worklist.md')
          text = path.read_text()

          replacements = {
              '| KYC / Blacklist / Document workflow | 🟡 PARTIAL — backend พร้อม เหลือ UI, PostgreSQL evidence บางส่วน และ deployed regression |':
                  '| KYC / Blacklist / Document workflow | 🟡 PARTIAL — Backend และ Admin/Member UI พร้อม เหลือ PostgreSQL evidence บางส่วนและ deployed regression |',
              '| P4 Frontend/UI/Observability R-012 ถึง R-014 | 🟡 IN PROGRESS |':
                  '| P4 Frontend/UI/Observability R-012 ถึง R-014 | 🟡 IN PROGRESS — R-012 ✅ DONE; R-013/R-014 อยู่ระหว่างดำเนินการ |',
              '- [ ] Admin KYC UI และ Member KYC upload UI':
                  '- [x] Admin KYC UI และ Member KYC upload UI',
              '## R-012 Frontend feature architecture และ large-page decomposition\n\nสถานะ: 🟡 IN PROGRESS\n\n- [x] เริ่มแยก page container/presentation ใน critical Member flows\n- [ ] ปิด decomposition ของ Admin/Member ทุก feature/domain\n- [ ] แยก schemas/defaults/serialization/error mapping และ server/UI state ครบ\n- [ ] Component/unit และ optimistic/unsaved-change regression ครบ':
                  '## R-012 Frontend feature architecture และ large-page decomposition\n\nสถานะ: ✅ DONE\n\n- [x] จัด Admin/Member folders ตาม feature/domain และกำหนด public exports\n- [x] แยก page container/presentation สำหรับ register, deposit, withdrawal, provider, CMS, promotion, security, KYC และ support\n- [x] แยก schemas/defaults/serialization/error mapping และ server/UI state\n- [x] เพิ่ม query-key/invalidation contracts, component/unit tests และ optimistic/unsaved-change regression\n- [x] เพิ่ม architecture audits, Member tests และ Admin/Member typecheck ใน CI\n\n**หลักฐาน:** `docs/r012-progress.md`, `tools/audit-r012-*.mjs`, `.github/workflows/r012-frontend-architecture.yml`; closure commits `bd1805c9e31d365ed4e737464d99dd2f9894004d`, `38ae8dc81417847ada56ab14816543a3e3e94a0f`',
              '2. ทำ R-012 Frontend feature/page decomposition ต่อ\n3. ทำ R-013 shared UI system และ visual/accessibility regression ต่อ\n4. ทำ R-014 observability, runbooks, documentation และ cleanup':
                  '2. R-012 Frontend feature/page decomposition — ✅ ปิดครบแล้ว\n3. ทำ R-013 shared UI system และ visual/accessibility regression ต่อ\n4. ทำ R-014 observability, runbooks, documentation และ cleanup',
              '1. ทำ R-012 Frontend feature/page decomposition ต่อจากงานที่เริ่มแล้ว\n2. ทำ R-013 shared components, responsive patterns, accessibility และ six-viewport visual regression\n3. เพิ่ม PostgreSQL integration/concurrency evidence สำหรับ watchlist/KYC document lifecycle\n4. ทำ Admin KYC UI และ Member KYC upload UI\n5. ตั้ง seeded non-production Admin/Member accounts และปิด authenticated regression\n6. ปิด production/staging migration, rollback และ deployed session/cookie checks\n7. ทำ R-014 observability, documentation, runbooks และ dead-code cleanup\n8. ปิด storage/performance/CI P5 ก่อน production launch\n9. ทำ provider-specific UAT หลังได้รับ vendor docs/credentials':
                  '1. ทำ R-013 shared components, responsive patterns, accessibility และ six-viewport visual regression\n2. เพิ่ม PostgreSQL integration/concurrency evidence สำหรับ watchlist/KYC document lifecycle\n3. ตั้ง seeded non-production Admin/Member accounts และปิด authenticated regression รวม KYC/risk\n4. ปิด production/staging migration, rollback และ deployed session/cookie checks\n5. ทำ R-014 observability, documentation, runbooks และ dead-code cleanup\n6. ปิด storage/performance/CI P5 ก่อน production launch\n7. ทำ provider-specific UAT หลังได้รับ vendor docs/credentials',
          }

          missing = []
          for old, new in replacements.items():
              if old not in text:
                  missing.append(old.splitlines()[0])
              else:
                  text = text.replace(old, new)

          if missing:
              raise SystemExit('Missing expected document anchors: ' + ', '.join(missing))

          path.write_text(text)
          PY

          rm .github/workflows/update-r012-docs-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/master-project-worklist.md .github/workflows/update-r012-docs-once.yml
          git commit -m 'docs: close R-012 in master project worklist'
          git push
