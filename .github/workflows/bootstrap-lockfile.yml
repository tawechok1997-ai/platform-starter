name: Bootstrap pnpm lockfile

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-lockfile.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate lockfile from registry
        run: pnpm install --lockfile-only

      - name: Enable frozen lockfile in build CI
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/build.yml')
          text = path.read_text()
          old = 'pnpm install --frozen-lockfile=false'
          new = 'pnpm install --frozen-lockfile'
          if old not in text and new not in text:
              raise SystemExit('Build workflow install command was not recognized')
          path.write_text(text.replace(old, new))
          PY

      - name: Verify frozen install
        run: pnpm install --frozen-lockfile

      - name: Commit lockfile and CI switch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml .github/workflows/build.yml
          if git diff --cached --quiet; then
            echo "Lockfile and frozen CI are already current"
            exit 0
          fi
          git commit -m "chore: add reproducible pnpm lockfile"
          git push origin HEAD:main
