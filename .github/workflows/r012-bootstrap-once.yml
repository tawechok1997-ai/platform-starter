name: R012 Bootstrap Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/r012-bootstrap-once.yml'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Create feature boundaries
        shell: bash
        run: |
          set -euo pipefail
          domains='auth finance kyc support cms'
          for app in web-admin web-member; do
            mkdir -p "apps/$app/src/features"
            for domain in $domains; do
              mkdir -p "apps/$app/src/features/$domain"
              cat > "apps/$app/src/features/$domain/index.ts" <<EOF
/** Public boundary for the ${domain} feature. Keep private implementation files unexported. */
export const ${domain^^}_FEATURE_BOUNDARY = '${domain}' as const;
EOF
            done
            cat > "apps/$app/src/features/index.ts" <<'EOF'
export * from './auth';
export * from './finance';
export * from './kyc';
export * from './support';
export * from './cms';
EOF
          done

          mkdir -p tools docs
          cat > tools/audit-r012-feature-boundaries.mjs <<'EOF'
import fs from 'node:fs';
import path from 'node:path';

const apps = ['web-admin', 'web-member'];
const domains = ['auth', 'finance', 'kyc', 'support', 'cms'];
const failures = [];
for (const app of apps) {
  const root = path.join('apps', app, 'src', 'features');
  const barrel = path.join(root, 'index.ts');
  if (!fs.existsSync(barrel)) failures.push(`${app}: missing feature public barrel`);
  const barrelSource = fs.existsSync(barrel) ? fs.readFileSync(barrel, 'utf8') : '';
  for (const domain of domains) {
    const entry = path.join(root, domain, 'index.ts');
    if (!fs.existsSync(entry)) failures.push(`${app}: missing ${domain} public entry`);
    if (!barrelSource.includes(`'./${domain}'`)) failures.push(`${app}: barrel does not export ${domain}`);
  }
}
if (failures.length) {
  console.error('R-012 feature-boundary audit failed:');
  failures.forEach((failure) => console.error(`- ${failure}`));
  process.exit(1);
}
console.log('R-012 feature-boundary audit passed.');
EOF

          cat > docs/r012-progress.md <<'EOF'
