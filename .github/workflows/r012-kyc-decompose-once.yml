name: R012 Decompose KYC Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/r012-kyc-decompose-once.yml'

permissions:
  contents: write

jobs:
  decompose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Move KYC implementations behind feature boundaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/web-admin/src/features/kyc apps/web-member/src/features/kyc

          cp 'apps/web-admin/app/(admin)/kyc-center/page.tsx' apps/web-admin/src/features/kyc/kyc-center-page.tsx
          sed -i "s#from '../../admin-api'#from '../../../app/admin-api'#" apps/web-admin/src/features/kyc/kyc-center-page.tsx
          sed -i "s#from '../_components/admin-ui'#from '../../../app/(admin)/_components/admin-ui'#" apps/web-admin/src/features/kyc/kyc-center-page.tsx
          cat > 'apps/web-admin/app/(admin)/kyc-center/page.tsx' <<'EOF'
          'use client';

          export { default } from '../../../src/features/kyc/kyc-center-page';
          EOF

          cp apps/web-member/app/kyc/page.tsx apps/web-member/src/features/kyc/member-kyc-page.tsx
          sed -i "s#from '../components/member-ui'#from '../../../app/components/member-ui'#" apps/web-member/src/features/kyc/member-kyc-page.tsx
          sed -i "s#from '../member-api'#from '../../../app/member-api'#" apps/web-member/src/features/kyc/member-kyc-page.tsx
          cat > apps/web-member/app/kyc/page.tsx <<'EOF'
          'use client';

          export { default } from '../../src/features/kyc/member-kyc-page';
          EOF

          grep -q "KycCenterPage" apps/web-admin/src/features/kyc/index.ts || printf "\nexport { default as KycCenterPage } from './kyc-center-page';\n" >> apps/web-admin/src/features/kyc/index.ts
          grep -q "MemberKycPage" apps/web-member/src/features/kyc/index.ts || printf "\nexport { default as MemberKycPage } from './member-kyc-page';\n" >> apps/web-member/src/features/kyc/index.ts

          cat > tools/audit-r012-kyc-boundary.mjs <<'EOF'
          import fs from 'node:fs';
          const read = (file) => fs.existsSync(file) ? fs.readFileSync(file, 'utf8') : '';
          const failures = [];
          const targets = [
            {
              label: 'admin',
              route: 'apps/web-admin/app/(admin)/kyc-center/page.tsx',
              feature: 'apps/web-admin/src/features/kyc/kyc-center-page.tsx',
              entry: 'apps/web-admin/src/features/kyc/index.ts',
              delegate: "from '../../../src/features/kyc/kyc-center-page'",
              api: "from '../../../app/admin-api'",
              exported: 'KycCenterPage',
            },
            {
              label: 'member',
              route: 'apps/web-member/app/kyc/page.tsx',
              feature: 'apps/web-member/src/features/kyc/member-kyc-page.tsx',
              entry: 'apps/web-member/src/features/kyc/index.ts',
              delegate: "from '../../src/features/kyc/member-kyc-page'",
              api: "from '../../../app/member-api'",
              exported: 'MemberKycPage',
            },
          ];
          for (const target of targets) {
            const route = read(target.route);
            const feature = read(target.feature);
            const entry = read(target.entry);
            if (!fs.existsSync(target.feature)) failures.push(`${target.label}: missing KYC feature implementation`);
            if (!route.includes(target.delegate)) failures.push(`${target.label}: KYC route must delegate to feature`);
            if (route.includes('ApiFetch(') || route.includes('useState(')) failures.push(`${target.label}: KYC route must remain thin`);
            if (!feature.includes(target.api)) failures.push(`${target.label}: KYC feature must own API orchestration`);
            if (!entry.includes(target.exported)) failures.push(`${target.label}: KYC public boundary must export ${target.exported}`);
          }
          if (failures.length) {
            console.error('R-012 KYC boundary audit failed:');
            failures.forEach((failure) => console.error(`- ${failure}`));
            process.exit(1);
          }
          console.log('R-012 KYC boundary audit passed.');
          EOF

          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/r012-frontend-architecture.yml')
          text = workflow.read_text()
          for marker in ["      - 'apps/web-admin/app/(admin)/security/**'", "      - 'apps/web-member/app/(auth)/register/**'"]:
              insert = marker + ("\n      - 'apps/web-admin/app/(admin)/kyc-center/**'" if 'security' in marker else "\n      - 'apps/web-member/app/kyc/**'")
              text = text.replace(marker, insert)
          text = text.replace('      - run: node tools/audit-r012-security-boundary.mjs', '      - run: node tools/audit-r012-security-boundary.mjs\n      - run: node tools/audit-r012-kyc-boundary.mjs')
          workflow.write_text(text)
          progress = Path('docs/r012-progress.md')
          p = progress.read_text()
          p = p.replace('DONE: 15/18', 'DONE: 16/18').replace('Remaining: 3', 'Remaining: 2')
          p = p.replace('IN PROGRESS: KYC and support page decomposition', 'IN PROGRESS: support page decomposition and regression coverage')
          p = p.replace('- [ ] แยก KYC admin/member pages', '- [x] แยก KYC admin/member pages')
          anchor = '- The Admin auth public boundary exports `AdminSecurityPage`; dedicated static audit prevents 2FA, session and QR orchestration from returning to the route file.'
          addition = anchor + '\n- Admin and Member KYC implementations now live behind their respective `src/features/kyc` boundaries; both App Router pages are thin entry points.\n- Dedicated KYC audit prevents API/state orchestration from returning to either route.'
          p = p.replace(anchor, addition)
          p = p.replace('node tools/audit-r012-security-boundary.mjs', 'node tools/audit-r012-security-boundary.mjs\nnode tools/audit-r012-kyc-boundary.mjs')
          progress.write_text(p)
          PY

          rm .github/workflows/r012-kyc-decompose-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web-admin apps/web-member tools/audit-r012-kyc-boundary.mjs docs/r012-progress.md .github/workflows
          git commit -m 'refactor(r012): move KYC routes behind feature boundaries'
          git push