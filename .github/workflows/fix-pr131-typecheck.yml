name: Repair PR 131 typecheck

on:
  push:
    branches:
      - agent/admin-batch-promotion-unsaved
    paths:
      - .github/workflows/fix-pr131-typecheck.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-batch-promotion-unsaved
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Apply exact optional property repair
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("apps/web-admin/src/features/cms/promotion-operations-page.tsx")
          text = path.read_text()
          replacements = {
              "category?: PromotionCategory;": "category?: PromotionCategory | undefined;",
              "imageUrl?: string;": "imageUrl?: string | undefined;",
              "iconUrl?: string;": "iconUrl?: string | undefined;",
              "badgeText?: string;": "badgeText?: string | undefined;",
              "accentColor?: string;": "accentColor?: string | undefined;",
              "priority?: number;": "priority?: number | undefined;",
              "startsAt?: string;": "startsAt?: string | undefined;",
              "endsAt?: string;": "endsAt?: string | undefined;",
              "couponCode?: string;": "couponCode?: string | undefined;",
              "rewardLabel?: string;": "rewardLabel?: string | undefined;",
              "lifecycle?: 'DRAFT' | 'PUBLISHED' | 'ARCHIVED';": "lifecycle?: 'DRAFT' | 'PUBLISHED' | 'ARCHIVED' | undefined;",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"expected type fragment not found: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          rm .github/workflows/fix-pr131-typecheck.yml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify Admin typecheck
        run: pnpm --filter @platform/web-admin typecheck
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web-admin/src/features/cms/promotion-operations-page.tsx .github/workflows/fix-pr131-typecheck.yml
          git commit -m "fix(admin): allow explicit undefined promotion fields"
          git push origin HEAD:agent/admin-batch-promotion-unsaved
