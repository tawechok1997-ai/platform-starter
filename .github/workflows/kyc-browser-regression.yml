name: KYC Browser Regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web-member/app/kyc/**'
      - 'apps/web-admin/app/(admin)/kyc/**'
      - 'tests/e2e-kyc/**'
      - 'playwright.kyc.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - 'apps/web-member/app/kyc/**'
      - 'apps/web-admin/app/(admin)/kyc/**'
      - 'tests/e2e-kyc/**'
      - 'playwright.kyc.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  kyc-browser-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run KYC responsive regression
        run: pnpm test:e2e:kyc --project=mobile-390 --project=tablet-768 --project=desktop-1024 --project=desktop-1440

      - name: Upload KYC Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kyc-playwright-report
          path: |
            playwright-kyc-report
            test-results
          if-no-files-found: warn
          retention-days: 14
