name: Agent API Route Inventory

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/agent-api-route-inventory.yml

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      API_URL: ${{ secrets.SEED_API_URL || secrets.P6_API_URL || 'https://platformapi-production-3c91.up.railway.app' }}
    steps:
      - name: Probe public API documentation endpoints
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p api-route-inventory
          for path in /api-json /swagger-json /openapi.json /docs-json /api/docs-json /swagger/v1/swagger.json; do
            name="$(printf '%s' "$path" | tr '/.' '__')"
            status="$(curl --silent --show-error --location --max-time 15 --output "api-route-inventory/${name}.body" --write-out '%{http_code}' "$API_URL$path" || true)"
            printf '%s\n' "$status" > "api-route-inventory/${name}.status"
          done
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const directory = 'api-route-inventory';
          const summary = [];
          for (const filename of fs.readdirSync(directory).filter((name) => name.endsWith('.status')).sort()) {
            const stem = filename.slice(0, -7);
            const status = fs.readFileSync(path.join(directory, filename), 'utf8').trim();
            const bodyPath = path.join(directory, `${stem}.body`);
            const body = fs.existsSync(bodyPath) ? fs.readFileSync(bodyPath, 'utf8') : '';
            summary.push({ stem, status, contentLength: body.length, looksJson: /^\s*[\[{]/.test(body) });
          }
          fs.writeFileSync(path.join(directory, 'summary.json'), `${JSON.stringify(summary, null, 2)}\n`);
          NODE

      - name: Upload route inventory
        uses: actions/upload-artifact@v4
        with:
          name: deployed-api-route-inventory-${{ github.sha }}
          path: api-route-inventory
          if-no-files-found: error
          retention-days: 1
