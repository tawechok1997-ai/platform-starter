name: Agent R-010 Query Inventory

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/agent-r010-query-inventory.yml'
      - 'apps/api/src/**/*.ts'
      - 'tools/audit-r010-query-inventory.mjs'

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Export normalized query inventory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p r010-inventory
          R010_QUERY_JSON=1 node tools/audit-r010-query-inventory.mjs > r010-inventory/query-inventory.json
      - uses: actions/upload-artifact@v4
        with:
          name: r010-query-inventory-${{ github.sha }}
          path: r010-inventory/query-inventory.json
          if-no-files-found: error
          retention-days: 1
