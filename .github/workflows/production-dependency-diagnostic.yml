name: Production Dependency Diagnostic

on:
  pull_request:
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'apps/**/package.json'
      - 'packages/**/package.json'
      - 'tools/audit-production-dependencies.mjs'
      - '.github/workflows/production-dependency-diagnostic.yml'

permissions:
  contents: read

jobs:
  production-dependency-diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies quietly
        run: pnpm install --frozen-lockfile --reporter=silent
      - name: Capture production dependency diagnostics
        shell: bash
        run: |
          set +e
          pnpm --filter @platform/api --filter @platform/web-admin --filter @platform/web-member --filter @platform/api-client list sharp --prod --json --depth Infinity > sharp-production-tree.json 2>&1
          pnpm audit:production-dependencies > production-dependency-audit.log 2>&1
          echo "$?" > production-dependency-audit.status
      - name: Upload production dependency diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: production-dependency-diagnostics
          path: |
            sharp-production-tree.json
            production-dependency-audit.log
            production-dependency-audit.status
          if-no-files-found: error
          retention-days: 1
      - name: Fail when production dependency audit failed
        shell: bash
        run: exit "$(cat production-dependency-audit.status)"
