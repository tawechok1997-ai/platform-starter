name: Admin Deployment Browser QA

on:
  workflow_dispatch:
    inputs:
      admin_base_url:
        description: Admin deployment URL
        required: false
        default: https://platformweb-admin-production.up.railway.app
      require_authentication:
        description: Require seeded Admin credentials and run the full authenticated acceptance matrix
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '20 2 * * *'
  push:
    branches: [main]
    paths:
      - 'apps/web-admin/**'
      - 'packages/design-tokens/**'
      - 'packages/ui-core/**'
      - 'tests/e2e-smoke/admin-deployment-matrix.spec.ts'
      - 'tests/e2e-smoke/admin-critical-routes.json'
      - 'tools/audit-admin-browser-route-matrix.mjs'
      - 'playwright.admin-deployment.config.ts'
      - '.github/workflows/admin-deployment-browser-qa.yml'

permissions:
  contents: read

concurrency:
  group: admin-deployment-browser-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ADMIN_BASE_URL: ${{ inputs.admin_base_url || vars.ADMIN_BASE_URL || 'https://platformweb-admin-production.up.railway.app' }}
      ADMIN_TEST_USERNAME: ${{ secrets.ADMIN_TEST_USERNAME }}
      ADMIN_TEST_PASSWORD: ${{ secrets.ADMIN_TEST_PASSWORD }}
      REQUIRE_AUTHENTICATION: ${{ inputs.require_authentication == true && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Audit browser route matrix
        run: node tools/audit-admin-browser-route-matrix.mjs

      - name: Validate acceptance configuration
        shell: bash
        run: |
          set -euo pipefail
          has_username=false
          has_password=false
          [[ -n "${ADMIN_TEST_USERNAME:-}" ]] && has_username=true
          [[ -n "${ADMIN_TEST_PASSWORD:-}" ]] && has_password=true

          if [[ "$has_username" != "$has_password" ]]; then
            echo "ADMIN_TEST_USERNAME and ADMIN_TEST_PASSWORD must be configured together." >&2
            exit 1
          fi

          if [[ "$REQUIRE_AUTHENTICATION" == "true" && "$has_username" != "true" ]]; then
            echo "Authenticated acceptance was requested, but seeded Admin credentials are missing." >&2
            exit 1
          fi

          if [[ "$REQUIRE_AUTHENTICATION" == "true" ]]; then
            echo "Authentication mode: signed-in acceptance"
          else
            echo "Authentication mode: public redirect smoke"
          fi

      - name: Deployment preflight
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking ${ADMIN_BASE_URL}/login"
          curl --fail --show-error --silent --location \
            --retry 4 --retry-delay 5 --retry-all-errors \
            --connect-timeout 15 --max-time 60 \
            --output /tmp/admin-login.html \
            "${ADMIN_BASE_URL}/login"
          test -s /tmp/admin-login.html

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run admin deployment matrix
        id: browser_qa
        continue-on-error: true
        run: pnpm exec playwright test -c playwright.admin-deployment.config.ts

      - name: Build QA manifest
        if: always()
        shell: bash
        env:
          QA_OUTCOME: ${{ steps.browser_qa.outcome }}
        run: |
          mkdir -p test-results/admin-deployment
          node <<'NODE'
          const fs = require('fs');
          const reportPath = 'test-results/admin-deployment/results.json';
          const matrixPath = 'tests/e2e-smoke/admin-critical-routes.json';
          let passed = 0;
          let failed = 0;
          let skipped = 0;
          let total = 0;
          const failures = [];
          if (fs.existsSync(reportPath)) {
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const visit = (suite, parents = []) => {
              const suitePath = [...parents, suite.title].filter(Boolean);
              for (const spec of suite.specs ?? []) {
                for (const test of spec.tests ?? []) {
                  total += 1;
                  const results = test.results ?? [];
                  const final = results.at(-1);
                  if (final?.status === 'passed') passed += 1;
                  else if (final?.status === 'skipped') skipped += 1;
                  else {
                    failed += 1;
                    failures.push({
                      title: [...suitePath, spec.title].filter(Boolean).join(' > '),
                      status: final?.status ?? 'unknown',
                      error: final?.error?.message ?? final?.errors?.[0]?.message ?? 'No error message recorded',
                    });
                  }
                }
              }
              for (const child of suite.suites ?? []) visit(child, suitePath);
            };
            for (const suite of report.suites ?? []) visit(suite);
          }
          const matrix = JSON.parse(fs.readFileSync(matrixPath, 'utf8'));
          const hasCredentials = Boolean(process.env.ADMIN_TEST_USERNAME && process.env.ADMIN_TEST_PASSWORD);
          const acceptanceRequested = process.env.REQUIRE_AUTHENTICATION === 'true';
          const authMode = acceptanceRequested ? 'signed-in acceptance' : 'public redirect smoke';
          const acceptanceComplete = acceptanceRequested && hasCredentials && process.env.QA_OUTCOME === 'success';
          const manifest = {
            schemaVersion: 5,
            workflow: process.env.GITHUB_WORKFLOW,
            runId: process.env.GITHUB_RUN_ID,
            runAttempt: process.env.GITHUB_RUN_ATTEMPT,
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            repository: process.env.GITHUB_REPOSITORY,
            commit: process.env.GITHUB_SHA,
            ref: process.env.GITHUB_REF,
            deployment: process.env.ADMIN_BASE_URL,
            authenticationMode: authMode,
            acceptance: {
              requested: acceptanceRequested,
              complete: acceptanceComplete,
              closesWorkItems: acceptanceComplete ? [
                'authenticated browser matrix',
                'mobile real-data interaction verification',
                'deployment visual evidence review',
              ] : [],
            },
            outcome: process.env.QA_OUTCOME,
            enforcement: acceptanceRequested ? 'blocking' : 'advisory',
            loginRoute: matrix.loginRoute,
            protectedRoutes: matrix.protectedRoutes,
            viewports: matrix.viewports,
            accessibility: {
              engine: '@axe-core/playwright',
              standards: ['wcag2a', 'wcag2aa', 'wcag21a', 'wcag21aa'],
              blockedImpacts: acceptanceRequested ? ['critical', 'serious'] : [],
              semanticChecks: acceptanceRequested ? ['main-landmark', 'single-h1', 'form-control-labels'] : [],
              violationEvidence: 'axe-*.json attachments on failure',
            },
            runtimeChecks: ['horizontal-overflow', 'document-title', 'meaningful-content', 'console-errors', 'page-errors', 'request-failures'],
            evidence: ['full-page screenshots', 'Playwright HTML report', 'JSON report', 'traces', 'failure videos', 'Axe violation attachments'],
            tests: { total, passed, failed, skipped, failures },
            generatedAt: new Date().toISOString(),
          };
          fs.writeFileSync('test-results/admin-deployment/manifest.json', `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = 'test-results/admin-deployment/manifest.json';
          const manifest = fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, 'utf8')) : null;
          console.log('## Admin Deployment Browser QA');
          console.log('');
          if (!manifest) {
            console.log('- Result manifest was not generated.');
            process.exit(0);
          }
          console.log(`- Outcome: **${manifest.outcome}**`);
          console.log(`- Enforcement: **${manifest.enforcement}**`);
          console.log(`- Deployment: ${manifest.deployment}`);
          console.log(`- Authentication mode: ${manifest.authenticationMode}`);
          console.log(`- Authenticated acceptance requested: ${manifest.acceptance.requested ? 'yes' : 'no'}`);
          console.log(`- Authenticated acceptance complete: **${manifest.acceptance.complete ? 'yes' : 'no'}**`);
          console.log(`- Routes: ${manifest.loginRoute}, ${manifest.protectedRoutes.join(', ')}`);
          console.log(`- Viewports: ${manifest.viewports.map((item) => item.width).join(', ')} px`);
          console.log(`- Tests: ${manifest.tests.passed} passed, ${manifest.tests.failed} failed, ${manifest.tests.skipped} skipped`);
          if (manifest.tests.failures.length) {
            console.log('');
            console.log('### Failed tests');
            for (const failure of manifest.tests.failures) {
              console.log(`- **${failure.title}** (${failure.status})`);
              console.log(`  - ${String(failure.error).replace(/\s+/g, ' ').slice(0, 500)}`);
            }
          }
          console.log(`- Runtime checks: ${manifest.runtimeChecks.join(', ')}`);
          if (manifest.acceptance.closesWorkItems.length) console.log(`- Closed work items: ${manifest.acceptance.closesWorkItems.join(', ')}`);
          console.log(`- Commit: \`${manifest.commit}\``);
          console.log(`- Run: ${manifest.runUrl}`);
          console.log(`- Evidence: ${manifest.evidence.join(', ')}`);
          NODE

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-deployment-playwright-report
          path: |
            playwright-report-admin
            test-results/admin-deployment
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce browser QA result
        if: always()
        shell: bash
        env:
          QA_OUTCOME: ${{ steps.browser_qa.outcome }}
        run: |
          if [[ "$QA_OUTCOME" == "success" ]]; then
            echo "Admin deployment browser QA passed."
            exit 0
          fi

          if [[ "$REQUIRE_AUTHENTICATION" == "true" ]]; then
            echo "Authenticated Admin deployment acceptance did not pass: $QA_OUTCOME" >&2
            exit 1
          fi

          echo "::warning title=Admin browser smoke findings::Public redirect smoke completed with outcome '$QA_OUTCOME'. Review the uploaded Playwright report and failed-test summary."
          exit 0
