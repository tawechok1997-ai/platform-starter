name: Restore Admin Worklist

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/restore-admin-worklist.yml

permissions:
  contents: write

jobs:
  restore:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore full worklist and patch wallet scope
        shell: bash
        run: |
          git checkout ead8da6d2511437f8d0346f27729b8ec2b95ad5f -- docs/admin-modernization-chat-worklist.md
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/admin-modernization-chat-worklist.md')
          text = path.read_text(encoding='utf-8')
          old_statement = '''### `/wallet-statement`

- [ ] Filter สมาชิก/วันที่
- [ ] Running balance
- [ ] Grouping ตามวัน
- [ ] Export CSV/PDF
- [ ] Transaction detail drawer'''
          new_statement = '''### `/wallet-statement`

- [x] Filter สมาชิก/วันที่
- [x] Running balance จาก balanceBefore/balanceAfter
- [x] Grouping ตามวัน
- [x] Export CSV และ Print/PDF
- [x] Transaction detail drawer
- [x] Server pagination และ loading/empty/safe error'''
          old_analytics = '''### `/wallet-analytics`

- [ ] ช่วงเวลา 7/30/90 วัน
- [ ] Line/bar chart
- [ ] Empty state
- [ ] ลดความสูงกราฟ
- [ ] Tooltip/legend'''
          new_analytics = '''### `/wallet-analytics`

- [x] ช่วงเวลา 7/14/30/90 วัน
- [x] Bar chart และตารางรายวัน
- [x] Empty/loading/error state
- [x] กราฟความสูงกระชับและ responsive
- [x] Tooltip/legend พร้อม keyboard focus
- [x] Liquidity health และ pending queue indicators'''
          if old_statement not in text:
              raise SystemExit('wallet statement block not found')
          if old_analytics not in text:
              raise SystemExit('wallet analytics block not found')
          text = text.replace(old_statement, new_statement, 1).replace(old_analytics, new_analytics, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Remove workflow and commit
        run: |
          rm .github/workflows/restore-admin-worklist.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/admin-modernization-chat-worklist.md .github/workflows/restore-admin-worklist.yml
          git commit -m "docs(admin): restore full worklist and close wallet scope"
          git push
