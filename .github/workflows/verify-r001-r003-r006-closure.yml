name: Verify R-001 R-003 R-006 Closure

on:
  push:
    branches: [main]
    paths:
      - tools/trigger-r001-r003-r006-verification.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Run closure verification and capture evidence
        id: verify
        shell: bash
        run: |
          set +e
          mkdir -p .closure-evidence
          overall=0
          run_check() {
            name="$1"
            shift
            "$@" > ".closure-evidence/${name}.log" 2>&1
            code=$?
            echo "$code" > ".closure-evidence/${name}.code"
            if [ "$code" -ne 0 ]; then overall=1; fi
          }
          run_check architecture-inventory pnpm audit:architecture-inventory
          run_check architecture-boundaries pnpm audit:architecture-boundaries
          run_check r1-closure pnpm audit:r1-closure
          run_check r2-closure pnpm audit:r2-closure
          run_check r3-closure pnpm audit:r3-closure
          run_check r6-closure pnpm audit:r6-closure
          run_check lint pnpm lint
          run_check typecheck pnpm typecheck
          node tools/write-r001-r003-r006-evidence.mjs .closure-evidence "$overall"
          echo "overall=$overall" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit closure evidence
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/architecture/r001-r003-r006-ci-evidence.md
          if git diff --cached --quiet; then
            echo 'Evidence unchanged.'
          else
            git commit -m 'docs(r001-r006): record clean closure verification [skip ci]'
            git push
          fi
      - name: Enforce verification result
        if: steps.verify.outputs.overall != '0'
        run: exit 1
